<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  --or:#e8703a;--lt:#f2a06a;--am:#f0c040;--rd:#d95040;
  --ok:#6db85a;--mu:rgba(255,200,150,.55);--tx:#fff;--t2:rgba(255,210,170,.8);
  --glass:rgba(8,4,2,.35);--ln:rgba(255,200,150,.15);--r:12px;
}
html,body{height:100%;background:#0f0804;color:var(--tx);font-family:'DM Mono',monospace;overflow-x:hidden;}

body::after{
  content:'';position:fixed;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.22),rgba(0,0,0,.4));
  z-index:-1;
}

/* MIST - pure CSS animations, no canvas */
.mist-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.mist-blob{
  position:absolute;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,255,255,.18) 0%,rgba(220,235,230,.08) 45%,transparent 70%);
  filter:blur(35px);
}
.mist-blob:nth-child(1){width:80%;height:50%;top:0%;left:-20%;animation:mist1 20s ease-in-out infinite;opacity:.75;}
.mist-blob:nth-child(2){width:70%;height:40%;top:20%;left:-30%;animation:mist2 27s ease-in-out infinite;opacity:.5;filter:blur(45px);}
.mist-blob:nth-child(3){width:60%;height:45%;top:45%;left:-10%;animation:mist3 34s ease-in-out infinite;opacity:.4;filter:blur(40px);}
.mist-blob:nth-child(4){width:75%;height:35%;top:65%;left:-35%;animation:mist1 23s ease-in-out infinite reverse;opacity:.35;filter:blur(50px);}
.mist-blob:nth-child(5){width:55%;height:55%;top:-5%;left:35%;animation:mist2 29s ease-in-out infinite reverse;opacity:.3;filter:blur(55px);}

@keyframes mist1{
  0%{transform:translateX(0%) scaleY(1);}
  25%{transform:translateX(18%) scaleY(1.12);}
  55%{transform:translateX(40%) scaleY(.9);}
  80%{transform:translateX(60%) scaleY(1.05);}
  100%{transform:translateX(78%) scaleY(1);}
}
@keyframes mist2{
  0%{transform:translateX(0%) scaleY(.9);}
  35%{transform:translateX(25%) scaleY(1.18);}
  65%{transform:translateX(50%) scaleY(.85);}
  100%{transform:translateX(82%) scaleY(.95);}
}
@keyframes mist3{
  0%{transform:translateX(0%) scaleY(1.05);}
  45%{transform:translateX(32%) scaleY(.88);}
  75%{transform:translateX(58%) scaleY(1.08);}
  100%{transform:translateX(80%) scaleY(1);}
}

/* APP - always on top */
#app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}

/* TOAST */
.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#e8703a,#c84e1e);color:#fff;
  font-size:13px;font-weight:600;padding:9px 24px;border-radius:99px;
  z-index:999;opacity:0;transition:all .3s;pointer-events:none;
  box-shadow:0 8px 24px rgba(232,112,58,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* HEADER */
.hdr{background:rgba(6,3,1,.45);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--ln);
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;gap:12px;}
.hp{width:54px;height:54px;border-radius:50%;object-fit:cover;object-position:center 15%;
  border:2px solid var(--or);box-shadow:0 0 16px rgba(232,112,58,.45);flex-shrink:0;}
.hn{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;line-height:1.1;}
.hs{font-size:10px;color:var(--mu);margin-top:2px;letter-spacing:.1em;text-transform:uppercase;}
.hdr-right{margin-left:auto;}
.notif-btn{background:rgba(255,255,255,.08);border:1px solid var(--ln);border-radius:10px;
  color:var(--t2);padding:7px 11px;font-size:16px;cursor:pointer;}

/* NEXT BAR */
#next-bar{background:rgba(4,2,1,.42);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--ln);padding:8px 12px;
  display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
#next-bar::-webkit-scrollbar{display:none;}
.ni2{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;
  border-radius:10px;padding:6px 10px;min-width:68px;cursor:pointer;
  background:rgba(255,255,255,.07);border:1px solid var(--ln);}
.ni2.ok{background:rgba(40,100,20,.4);border-color:rgba(80,160,50,.3);}
.ni2.warn{background:rgba(110,70,5,.4);border-color:rgba(180,120,10,.3);}
.ni2.late{background:rgba(110,20,20,.4);border-color:rgba(180,50,40,.3);}
.ni2-ic{font-size:14px;}.ni2-lb{font-size:9px;color:var(--mu);text-transform:uppercase;}
.ni2-d{font-size:11px;font-weight:500;}
.ni2.ok .ni2-d{color:#8edb7e;}.ni2.warn .ni2-d{color:var(--am);}.ni2.late .ni2-d{color:#f09080;}

/* NAV */
.nav{background:rgba(4,2,1,.45);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--ln);
  display:flex;overflow-x:auto;padding:5px 8px;gap:2px;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;background:none;border:1px solid transparent;border-radius:8px;
  color:var(--mu);cursor:pointer;font-family:inherit;font-size:10px;
  padding:5px 10px;display:flex;flex-direction:column;align-items:center;gap:1px;}
.nb .ni{font-size:14px;}
.nb.act{background:rgba(232,112,58,.2);border-color:var(--or);color:#fff;}

/* MAIN */
.main{flex:1;padding:13px;max-width:640px;margin:0 auto;width:100%;
  padding-bottom:calc(13px + env(safe-area-inset-bottom));}

/* CARDS */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.card{background:var(--glass);backdrop-filter:blur(14px);
  border:1px solid var(--ln);border-radius:var(--r);
  padding:11px 13px;display:flex;flex-direction:column;gap:3px;}
.card.full{grid-column:1/-1;}.card.al{border-color:rgba(240,192,64,.45);}
.cl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);}
.cv{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;line-height:1;}
.cv2{font-size:13px;color:#fff;margin-top:1px;}
.du{color:#8edb7e;font-size:11px;}.dd{color:#f09080;font-size:11px;}
.bok,.bw,.bn{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;display:inline-block;margin-top:3px;}
.bok{background:rgba(40,110,20,.45);color:#8edb7e;border:1px solid rgba(70,160,40,.3);}
.bw{background:rgba(110,60,5,.5);color:var(--am);border:1px solid rgba(160,110,10,.35);}
.bn{background:rgba(110,18,18,.5);color:#f09080;border:1px solid rgba(160,45,35,.35);}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.qb{flex:1;min-width:75px;border:1px solid var(--ln);border-radius:8px;
  background:rgba(0,0,0,.2);color:var(--t2);cursor:pointer;
  font-family:inherit;font-size:11px;padding:8px 4px;text-align:center;}
.qb:active{border-color:var(--or);color:#fff;background:rgba(232,112,58,.2);}

/* SECTIONS */
.sc{background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--ln);
  border-radius:var(--r);padding:13px;margin-bottom:10px;}
.st{font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;margin-bottom:10px;}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.lb2{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);}
.inp{background:rgba(4,2,1,.5);border:1px solid rgba(255,200,150,.2);border-radius:8px;
  color:#fff;font-family:inherit;font-size:16px;padding:10px 11px;width:100%;outline:none;}
.inp:focus{border-color:var(--or);}
.inp::placeholder{color:rgba(255,200,150,.3);}
.ir{display:flex;gap:7px;}.ir .inp{flex:1;}
.ab{background:var(--or);color:#fff;border:none;border-radius:8px;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
  padding:10px 15px;white-space:nowrap;}
.ab:active{opacity:.85;}
.ab.full{width:100%;margin-top:4px;padding:12px;}
.ab.sec{background:rgba(255,255,255,.08);border:1px solid var(--ln);}

/* ROWS */
.ll{display:flex;flex-direction:column;gap:5px;}
.row{background:rgba(0,0,0,.22);backdrop-filter:blur(10px);
  border:1px solid var(--ln);border-radius:8px;
  display:flex;justify-content:space-between;align-items:center;padding:10px 12px;gap:8px;}
.rl{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.rla{font-size:13px;color:#fff;}.rsu{font-size:10px;color:var(--mu);}
.rr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rda{font-size:11px;color:var(--mu);cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px;}
.dl{background:rgba(255,255,255,.06);border:1px solid var(--ln);border-radius:6px;
  color:var(--mu);cursor:pointer;font-size:12px;padding:4px 8px;}
.dl:active{color:#f09080;}
.emp{color:var(--mu);font-size:12px;text-align:center;padding:20px 0;font-style:italic;}
.uvb{background:rgba(110,60,5,.6);backdrop-filter:blur(10px);
  border:1px solid rgba(240,192,64,.4);border-radius:var(--r);
  padding:10px 13px;margin-bottom:10px;font-size:12px;color:var(--am);}
.ib2{background:rgba(0,0,0,.2);border-radius:8px;padding:9px 11px;margin-bottom:9px;
  font-size:12px;color:var(--t2);line-height:1.7;border:1px solid var(--ln);}
input[type=date],input[type=month]{cursor:pointer;color-scheme:dark;}

/* CAROUSEL */
.carousel-wrap{position:relative;margin-bottom:10px;}
.carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;border-radius:var(--r);border:1px solid var(--ln);}
.carousel::-webkit-scrollbar{display:none;}
.carousel-slide{flex-shrink:0;width:100%;scroll-snap-align:start;position:relative;}
.carousel-slide img{width:100%;height:220px;object-fit:cover;border-radius:var(--r);display:block;}
.carousel-empty{width:100%;height:160px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:var(--mu);
  font-size:12px;background:var(--glass);border-radius:var(--r);}
.c-add{position:absolute;bottom:10px;right:10px;background:rgba(232,112,58,.88);
  border:none;border-radius:99px;color:#fff;padding:7px 14px;
  font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.c-del{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.55);
  border:none;border-radius:99px;color:var(--t2);padding:7px 12px;
  font-family:inherit;font-size:12px;cursor:pointer;}
.c-date{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  border-radius:0 0 var(--r) var(--r);padding:18px 12px 8px;
  font-size:11px;color:rgba(255,210,170,.9);text-align:center;pointer-events:none;}
.c-count{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.55);
  border-radius:99px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,.85);}
.carousel-dots{display:flex;justify-content:center;gap:5px;margin-top:7px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,200,150,.2);}
.dot.act{background:var(--or);width:16px;border-radius:3px;}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.gthumb{position:relative;cursor:pointer;border-radius:8px;overflow:hidden;
  aspect-ratio:1;border:1px solid var(--ln);}
.gthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.gthumb-date{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  padding:10px 4px 4px;font-size:9px;color:rgba(255,210,170,.85);text-align:center;}

<script>
const KEY="cham_v7";
const blank={name:"Yoshi",uvDate:"",birthdate:"",weightLog:[],feedLog:[],moltLog:[],bathLog:[],vitaminLog:[],photos:[],substrateLog:[]};
let data=JSON.parse(localStorage.getItem(KEY)||"null")||{...blank};
if(!data.photos)data.photos=[];
if(!data.substrateLog)data.substrateLog=[];
if(data.birthdate===undefined)data.birthdate="";
const save=()=>localStorage.setItem(KEY,JSON.stringify(data));
const fd=iso=>iso?new Date(iso).toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"}):"—";
const ds=iso=>iso?Math.floor((Date.now()-new Date(iso))/86400000):null;
const ms=iso=>iso?((Date.now()-new Date(iso))/(86400000*30.44)).toFixed(1):null;
const today=()=>new Date().toISOString().slice(0,10);
const isoFromDate=d=>new Date(d+"T12:00:00").toISOString();
function calcAge(birthdate){
  if(!birthdate)return null;
  // supports "YYYY-MM" or "YYYY-MM-DD"
  const parts=birthdate.split("-");
  const year=parseInt(parts[0]);
  const month=parseInt(parts[1])-1;
  const day=parts[2]?parseInt(parts[2]):1;
  const b=new Date(year,month,day);
  const now=new Date();
  let years=now.getFullYear()-b.getFullYear();
  let months=now.getMonth()-b.getMonth();
  if(months<0){years--;months+=12;}
  if(parts[2]&&now.getDate()<b.getDate()&&months>0)months--;
  if(months<0){years--;months+=11;}
  return{years,months};
}

const TABS=[
  {id:"dash",icon:"◈",label:"Resumo"},
  {id:"weight",icon:"⚖",label:"Peso"},
  {id:"feed",icon:"🦗",label:"Larvas"},
  {id:"molt",icon:"✦",label:"Muda"},
  {id:"bath",icon:"◉",label:"Banho"},
  {id:"vitamins",icon:"✿",label:"Vitaminas"},
  {id:"uv",icon:"☀",label:"UV"},
  {id:"gallery",icon:"📸",label:"Galeria"},
];
let tab="dash";
let lbIdx=-1;
let modalField=null,modalIdx=null;

// ── Toast ──
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── Modal date editor ──
function openModal(field,idx,currentDate){
  modalField=field;modalIdx=idx;
  document.getElementById("modal-title").textContent="Alterar data";
  document.getElementById("modal-date").value=currentDate?currentDate.slice(0,10):today();
  document.getElementById("date-modal").classList.add("show");
}
function closeModal(){document.getElementById("date-modal").classList.remove("show");modalField=null;modalIdx=null;}
function saveModalDate(){
  const val=document.getElementById("modal-date").value;
  if(!val){closeModal();return;}
  if(modalField==="uvDate"){data.uvDate=val;}
  else{data[modalField][modalIdx].date=isoFromDate(val);}
  save();closeModal();render();toast("📅 Data actualizada!");
}

// ── Badges ──
function bdg(days,warn,alt){
  if(days===null)return'<span class="bn">Nunca</span>';
  if(days===0)return'<span class="bok">Hoje</span>';
  if(alt||days>warn)return`<span class="bw">${days}d atrás</span>`;
  return`<span class="bok">${days}d atrás</span>`;
}

// ── Rows with edit date ──
function row(label,sub,date,field,idx){
  const dateStr=date?date.slice(0,10):today();
  return`<div class="row">
    <div class="rl"><span class="rla">${label}</span>${sub?`<span class="rsu">${sub}</span>`:""}</div>
    <div class="rr">
      <span class="rda" onclick="openModal('${field}',${idx},'${dateStr}')" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px">${fd(date)}</span>
      <button class="dl" onclick="del('${field}',${idx})">✕</button>
    </div>
  </div>`;
}
function del(field,idx){data[field].splice(idx,1);save();render();}

// ── Next bar ──
function renderNextBar(){
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;
  const lM=data.moltLog[0]?.date||null,lF=data.feedLog[0]?.date||null;
  const rM=lM&&ds(lM)<=45,bW=rM?15:30;
  function ni(icon,lbl,last,interval,field){
    const cls=!last?"late":((interval-ds(last))>3?"ok":(interval-ds(last))>=0?"warn":"late");
    const txt=!last?"Nunca":(interval-ds(last))>0?`em ${interval-ds(last)}d`:(interval-ds(last))===0?"Hoje!":`${Math.abs(interval-ds(last))}d atr.`;
    return`<div class="ni2 ${cls}" onclick="setTab('${field}')"><span class="ni2-ic">${icon}</span><span class="ni2-lb">${lbl}</span><span class="ni2-d">${txt}</span></div>`;
  }
  const lW2=data.weightLog[0]?.date||null;
  const lS=data.substrateLog[0]?.date||null;
  document.getElementById("next-bar").innerHTML=
    ni("⚖","Peso",lW2,14,"weight")+
    ni("🦗","Larvas",lF,7,"feed")+
    ni("◉","Banho",lB,bW,"bath")+
    ni("✿","Vitaminas",lV,7,"vitamins")+
    ni("🪨","Substrato",lS,90,"substrate");
}

// ── Carousel ──
function buildCarousel(){
  const p=data.photos;
  if(!p.length)return`<div class="carousel-wrap"><div class="carousel"><div class="carousel-slide"><div class="carousel-empty"><span>📸</span>Adiciona fotos do Yoshi!</div></div></div><button class="c-add" onclick="document.getElementById('photo-input').click()">+ Foto</button></div>`;
  const slides=p.map((ph,i)=>`<div class="carousel-slide"><img src="${ph.src}" alt="Yoshi" onclick="openPhoto(${i})"/><button class="c-del" onclick="delCarouselPhoto(${i})">🗑</button>${p.length>1?`<div class="c-count">${i+1}/${p.length}</div>`:""}<div class="c-date">${fd(ph.date)}</div></div>`).join("");
  const dots=p.length>1?`<div class="carousel-dots">${p.map((_,i)=>`<div class="dot${i===0?" act":""}" id="dot-${i}"></div>`).join("")}</div>`:"";
  return`<div class="carousel-wrap"><div class="carousel" id="carousel" onscroll="updateDots()">${slides}</div>${dots}<button class="c-add" onclick="document.getElementById('photo-input').click()">+ Foto</button></div>`;
}
function updateDots(){const c=document.getElementById("carousel");if(!c)return;const idx=Math.round(c.scrollLeft/c.offsetWidth);document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("act",i===idx));}
function delCarouselPhoto(i){data.photos.splice(i,1);save();render();toast("🗑 Foto apagada!");}
function openPhoto(idx){lbIdx=idx;document.getElementById("lb-img").src=data.photos[idx].src;document.getElementById("lb-date").textContent=fd(data.photos[idx].date);document.getElementById("lightbox").classList.add("show");}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");}
function deletePhoto(){if(lbIdx<0)return;data.photos.splice(lbIdx,1);save();closeLightbox();render();toast("🗑 Foto apagada!");}
function addPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const max=900;let w=img.width,h=img.height;
      if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      data.photos=[{id:Date.now(),src:canvas.toDataURL("image/jpeg",.72),date:new Date().toISOString()},...data.photos];
      save();render();toast("📸 Foto adicionada!");
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);e.target.value="";
}

// ── Render ──
function render(){
  // update header
  document.getElementById("hdr-name").textContent=data.name||"Yoshi";
  const age=calcAge(data.birthdate);
  if(age){
    const parts=[];
    if(age.years>0)parts.push(`${age.years} ano${age.years!==1?"s":""}`);
    if(age.months>0)parts.push(`${age.months} ${age.months!==1?"meses":"mês"}`);
    document.getElementById("hdr-age").textContent=parts.length?parts.join(" e "):"Recém-nascido";
  } else {
    document.getElementById("hdr-age").textContent="Ficha de Seguimento";
  }
  renderNextBar();
  document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="nb${tab===t.id?" act":""}" onclick="setTab('${t.id}')"><span class="ni">${t.icon}</span>${t.label}</button>`).join("");
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;
  const lM=data.moltLog[0]?.date||null,lF=data.feedLog[0]?.date||null;
  const lW=data.weightLog[0]?.value||null,pW=data.weightLog[1]?.value||null;
  const wd=lW&&pW?(lW-pW).toFixed(1):null;
  const uvM=data.uvDate?parseFloat(ms(data.uvDate)):null,uvA=uvM!==null&&uvM>=8;
  const rM=lM&&ds(lM)<=45,bW=rM?15:30,bD=ds(lB),bA=bD!==null&&bD>bW,vD=ds(lV),vA=vD!==null&&vD>7;
  let h="";
  if(uvA)h+=`<div class="uvb">☀ Lâmpada UV com ${uvM} meses — substituição recomendada!</div>`;

  if(tab==="dash"){
    h+=buildCarousel();
    h+=`<div class="grid">
      <div class="card${lW&&ds(data.weightLog[0]?.date)>14?" al":""}"><div class="cl">Último Peso</div><div class="cv">${lW?lW+"g":"—"}</div>${wd!==null?`<div class="${parseFloat(wd)>=0?"du":"dd"}">${parseFloat(wd)>=0?"▲":"▼"} ${Math.abs(wd)}g</div>`:""}<div style="font-size:10px;color:var(--mu);margin-top:3px">pesar cada 2 sem.</div></div>
      <div class="card"><div class="cl">Larvas</div><div class="cv2">${fd(lF)}</div>${bdg(ds(lF),7)}${data.feedLog[0]?`<div style="font-size:10px;color:var(--mu);margin-top:3px">${data.feedLog[0].qty} larvas</div>`:""}</div>
      <div class="card${bA?" al":""}"><div class="cl">Banho</div><div class="cv2">${fd(lB)}</div>${bdg(bD,bW,bA)}<div style="font-size:10px;color:var(--mu);margin-top:3px">${rM?"2× mês (muda)":"1× mês"}</div></div>
      <div class="card${vA?" al":""}"><div class="cl">Vitaminas</div><div class="cv2">${fd(lV)}</div>${bdg(vD,7,vA)}<div style="font-size:10px;color:var(--mu);margin-top:3px">1× semana</div></div>
      <div class="card"><div class="cl">Última Muda</div><div class="cv2">${fd(lM)}</div>${lM?`<span class="bok">${ds(lM)}d atrás</span>`:'<span class="bn">Nunca</span>'}<div style="font-size:10px;color:var(--mu);margin-top:3px">sem prazo fixo</div></div>
      <div class="card${data.substrateLog[0]&&ds(data.substrateLog[0].date)>90?" al":""}"><div class="cl">Substrato</div><div class="cv2">${fd(data.substrateLog[0]?.date||null)}</div>${bdg(ds(data.substrateLog[0]?.date||null),90)}<div style="font-size:10px;color:var(--mu);margin-top:3px">trocar 3 em 3 meses</div></div>
      <div class="card${uvA?" al":""}"><div class="cl">UV</div><div class="cv2">${data.uvDate?fd(data.uvDate):"—"}</div>${uvM!==null?`<div style="font-size:10px;color:${uvA?"var(--am)":"var(--mu)"};margin-top:3px">${uvM}m · ${uvA?"⚠ Trocar":"OK"}</div>`:""}</div>
      <div class="card full"><div class="cl">Acções Rápidas</div><div class="quick">
        <button class="qb" onclick="setTab('weight')">⚖ Peso</button>
        <button class="qb" onclick="setTab('feed')">🦗 Larvas</button>
        <button class="qb" onclick="addBath()">◉ Banho</button>
        <button class="qb" onclick="addVit()">✿ Vitaminas</button>
        <button class="qb" onclick="addMolt()">✦ Muda</button>
      </div></div>
    </div>`;
  }
  else if(tab==="weight"){
    // build SVG chart
    const wData=[...data.weightLog].reverse();
    let chartHtml="";
    if(wData.length>=2){
      const W=320,H=120,pad={t:16,r:12,b:28,l:36};
      const vals=wData.map(e=>e.value);
      const minV=Math.min(...vals),maxV=Math.max(...vals);
      const span=maxV-minV||1;
      const cx=(i)=>pad.l+(i/(wData.length-1))*(W-pad.l-pad.r);
      const cy=(v)=>pad.t+(1-(v-minV)/span)*(H-pad.t-pad.b);
      const pts=wData.map((e,i)=>`${cx(i)},${cy(e.value)}`).join(" ");
      const areaBottom=H-pad.b;
      const areaPts=`${cx(0)},${areaBottom} `+wData.map((e,i)=>`${cx(i)},${cy(e.value)}`).join(" ")+` ${cx(wData.length-1)},${areaBottom}`;
      // y axis labels
      const yLabels=[minV,minV+span/2,maxV].map(v=>{
        const y=cy(v);
        return`<text x="${pad.l-4}" y="${y+4}" text-anchor="end" fill="rgba(255,200,150,.5)" font-size="9">${v.toFixed(1)}</text>`;
      }).join("");
      // x axis labels (first, middle, last)
      const xIdxs=[0,Math.floor((wData.length-1)/2),wData.length-1].filter((v,i,a)=>a.indexOf(v)===i);
      const xLabels=xIdxs.map(i=>{
        const d=new Date(wData[i].date);
        const lbl=d.toLocaleDateString("pt-PT",{day:"2-digit",month:"short"});
        return`<text x="${cx(i)}" y="${H-pad.b+14}" text-anchor="middle" fill="rgba(255,200,150,.5)" font-size="9">${lbl}</text>`;
      }).join("");
      // grid lines
      const gridLines=[0,.25,.5,.75,1].map(f=>{
        const y=pad.t+f*(H-pad.t-pad.b);
        return`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="rgba(255,200,150,.08)" stroke-width="1"/>`;
      }).join("");
      // dots
      const dots=wData.map((e,i)=>`<circle cx="${cx(i)}" cy="${cy(e.value)}" r="3.5" fill="#e8703a" stroke="#f2a06a" stroke-width="1.5"/>`).join("");
      chartHtml=`<div class="sc" style="padding:14px 10px 10px">
        <div class="cl" style="margin-bottom:8px">Evolução do Peso</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
          <defs>
            <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8703a" stop-opacity=".35"/>
              <stop offset="100%" stop-color="#e8703a" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${gridLines}
          <polygon points="${areaPts}" fill="url(#wg)"/>
          <polyline points="${pts}" fill="none" stroke="#e8703a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
          ${yLabels}
          ${xLabels}
        </svg>
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--t2)">
          <span>Mín: <strong style="color:#fff">${minV}g</strong></span>
          <span>Máx: <strong style="color:#fff">${maxV}g</strong></span>
          ${wd!==null?`<span>Δ última: <strong class="${parseFloat(wd)>=0?"du":"dd"}">${parseFloat(wd)>=0?"+":""}${wd}g</strong></span>`:""}

function setTab(t){tab=t;haptic([20]);render();}

function addFeed(){const q=parseInt(document.getElementById("fq")?.value);const d2=document.getElementById("fd2")?.value||today();if(!q||q<=0)return;data.feedLog=[{id:Date.now(),date:isoFromDate(d2),qty:q},...data.feedLog];save();render();haptic([30,20,30]);toast("🦗 Larvas registadas!");}
function addMolt(){data.moltLog=[{id:Date.now(),date:new Date().toISOString()},...data.moltLog];save();render();haptic([50,30,50,30,100]);confetti();toast("🎉 Muda registada!");}
function addBath(){data.bathLog=[{id:Date.now(),date:new Date().toISOString()},...data.bathLog];save();render();haptic([30,20,30]);toast("◉ Banho registado!");}
function addVit(){data.vitaminLog=[{id:Date.now(),date:new Date().toISOString()},...data.vitaminLog];save();render();haptic([30,20,30]);toast("✿ Vitaminas registadas!");}
function addSubstrate(){data.substrateLog=[{id:Date.now(),date:new Date().toISOString()},...data.substrateLog];save();render();haptic([30,20,30]);toast("🪨 Substrato registado!");}
function saveUV(){const v=document.getElementById("uvd")?.value;if(v){data.uvDate=v;save();render();haptic([20]);toast("☀ UV guardado!");}}
function saveBirthdate(){const v=document.getElementById("bdt")?.value;if(v){data.birthdate=v;save();render();haptic([20]);toast("🎂 Data de nascimento guardada!");}}

// ── Confetti ──
function confetti(){
  const canvas=document.createElement("canvas");
  canvas.style.cssText="position:fixed;inset:0;width:100%;height:100%;z-index:500;pointer-events:none;";
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const pieces=[];
  const colors=["#e8703a","#f2a06a","#f0c040","#7edb6e","#7ab5b0","#fff","#f09080"];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*canvas.height*0.5,
      r:4+Math.random()*6,
      d:2+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      tilt:Math.random()*10-5,
      tiltV:0.15+Math.random()*0.15,
      shape:Math.random()>0.5?"circle":"rect",
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*6,
    });
  }
  let frame=0;
  const max=160;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.globalAlpha=frame<max?1:Math.max(0,1-(frame-max)/40);
      if(p.shape==="circle"){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
      ctx.restore();
      p.y+=p.d+(frame/60);
      p.x+=Math.sin(frame*0.02+p.tilt)*1.5;
      p.rot+=p.rotV;
      p.tilt+=p.tiltV;
    });
    frame++;
    if(frame<max+40)requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

render();

// ── Notifications toggle ──
let notifEnabled=localStorage.getItem('notif')==='1';
function updateNotifBtn(){
  const btn=document.getElementById('notif-btn');
  btn.textContent=notifEnabled?'🔔':'🔕';
  btn.style.background=notifEnabled?'rgba(232,112,58,.25)':'rgba(255,255,255,.08)';
  btn.style.borderColor=notifEnabled?'rgba(232,112,58,.5)':'rgba(255,200,150,.15)';
}
updateNotifBtn();
async function toggleNotif(){
  if(Notification.permission==='granted'){
    notifEnabled=!notifEnabled;
    localStorage.setItem('notif',notifEnabled?'1':'0');
    updateNotifBtn();
    toast2(notifEnabled?'🔔 Notificações activadas!':'🔕 Notificações desactivadas.');
  } else {
    const p=await Notification.requestPermission();
    if(p==='granted'){notifEnabled=true;localStorage.setItem('notif','1');updateNotifBtn();toast2('🔔 Notificações activadas!');}
    else{toast2('🔕 Permissão negada.');}
  }
}
function checkNotifications(){
  if(!notifEnabled||Notification.permission!=='granted')return;
  const now=new Date();if(now.getHours()<11)return;
  const todayStr=today();
  if(localStorage.getItem('lastNotifCheck')===todayStr)return;
  localStorage.setItem('lastNotifCheck',todayStr);
  const lM=data.moltLog[0]?.date||null,rM=lM&&ds(lM)<=45;
  [{f:'weightLog',l:'Peso',i:14},{f:'feedLog',l:'Larvas',i:7},
   {f:'bathLog',l:'Banho',i:rM?15:30},{f:'vitaminLog',l:'Vitaminas',i:7},
   {f:'substrateLog',l:'Substrato',i:90}].forEach(c=>{
    const last=data[c.f][0]?.date||null;if(!last)return;
    const r=c.i-ds(last);
    if(r===0)new Notification('Yoshi 🦎',{body:`Hoje é dia de ${c.l}!`});
    else if(r===1)new Notification('Yoshi 🦎',{body:`Amanhã é dia de ${c.l}.`});
  });
}
checkNotifications();
