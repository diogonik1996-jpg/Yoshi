<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0f0804"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Yoshi"/>
<link rel="apple-touch-icon" href="./icon.png"/>
<link rel="manifest" href="./manifest.json"/>
<title>Yoshi 🦎</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --or:#e8703a;--lt:#f2a06a;--am:#f0c040;--rd:#d95040;
  --mu:rgba(255,210,160,.9);--tx:#fff;--t2:rgba(255,220,180,1);
  --glass:rgba(0,0,0,0);--ln:rgba(255,200,150,.15);--r:12px;
}
html,body{height:100%;background:#0f0804;color:var(--tx);font-family:'DM Mono',monospace;overflow-x:hidden;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.7);}
#bg{position:fixed;inset:0;z-index:0;}
#bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.72) saturate(1);}
#ov{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.25));z-index:1;pointer-events:none;}
.mist-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2;}
.mb{position:absolute;border-radius:50%;filter:blur(38px);}
.mb:nth-child(1){width:80%;height:50%;top:0;left:-20%;background:radial-gradient(ellipse,rgba(255,255,255,.18) 0%,transparent 70%);animation:m1 20s ease-in-out infinite;opacity:.7;}
.mb:nth-child(2){width:70%;height:40%;top:25%;left:-30%;background:radial-gradient(ellipse,rgba(255,255,255,.13) 0%,transparent 70%);animation:m2 27s ease-in-out infinite;opacity:.5;filter:blur(48px);}
.mb:nth-child(3){width:60%;height:45%;top:50%;left:-10%;background:radial-gradient(ellipse,rgba(255,255,255,.10) 0%,transparent 70%);animation:m3 34s ease-in-out infinite;opacity:.4;}
.mb:nth-child(4){width:75%;height:35%;top:70%;left:-35%;background:radial-gradient(ellipse,rgba(255,255,255,.09) 0%,transparent 70%);animation:m1 23s ease-in-out infinite reverse;opacity:.35;filter:blur(52px);}
@keyframes m1{0%{transform:translateX(0%) scaleY(1);}50%{transform:translateX(45%) scaleY(.9);}100%{transform:translateX(80%) scaleY(1);}}
@keyframes m2{0%{transform:translateX(0%);}50%{transform:translateX(50%) scaleY(1.2);}100%{transform:translateX(85%);}}
@keyframes m3{0%{transform:translateX(0%);}50%{transform:translateX(40%) scaleY(.85);}100%{transform:translateX(78%);}}
#app{position:relative;z-index:3;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);background:linear-gradient(135deg,#e8703a,#c84e1e);color:#fff;font-size:13px;font-weight:600;padding:9px 24px;border-radius:99px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hdr{background:rgba(0,0,0,.28);backdrop-filter:blur(20px);border-bottom:1px solid var(--ln);padding:calc(12px + env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;}
.hp{width:54px;height:54px;border-radius:50%;object-fit:cover;object-position:center 15%;border:2px solid var(--or);box-shadow:0 0 16px rgba(232,112,58,.45);flex-shrink:0;}
.hn{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;line-height:1.1;}
.hs{font-size:10px;color:var(--mu);margin-top:2px;letter-spacing:.1em;text-transform:uppercase;}
.hdr-right{margin-left:auto;}
.notif-btn{background:rgba(255,255,255,.08);border:1px solid var(--ln);border-radius:10px;color:var(--t2);padding:7px 11px;font-size:16px;cursor:pointer;}
#next-bar{background:rgba(0,0,0,.25);backdrop-filter:blur(12px);border-bottom:1px solid var(--ln);padding:8px 12px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
#next-bar::-webkit-scrollbar{display:none;}
.ni2{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:10px;padding:6px 10px;min-width:68px;cursor:pointer;background:rgba(255,255,255,.07);border:1px solid var(--ln);}
.ni2.ok{background:rgba(40,100,20,.4);border-color:rgba(80,160,50,.3);}
.ni2.warn{background:rgba(110,70,5,.4);border-color:rgba(180,120,10,.3);}
.ni2.late{background:rgba(110,20,20,.4);border-color:rgba(180,50,40,.3);}
.ni2-ic{font-size:14px;}.ni2-lb{font-size:9px;color:var(--mu);text-transform:uppercase;}
.ni2-d{font-size:11px;font-weight:500;}
.ni2.ok .ni2-d{color:#8edb7e;}.ni2.warn .ni2-d{color:var(--am);}.ni2.late .ni2-d{color:#f09080;}
.nav{background:rgba(0,0,0,.28);backdrop-filter:blur(18px);border-bottom:1px solid var(--ln);display:flex;overflow-x:auto;padding:5px 8px;gap:2px;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;background:none;border:1px solid transparent;border-radius:8px;color:var(--mu);cursor:pointer;font-family:inherit;font-size:10px;padding:5px 10px;display:flex;flex-direction:column;align-items:center;gap:1px;}
.nb .ni{font-size:14px;}.nb.act{background:rgba(232,112,58,.2);border-color:var(--or);color:#fff;}
.main{flex:1;padding:13px;max-width:640px;margin:0 auto;width:100%;padding-bottom:calc(13px + env(safe-area-inset-bottom));}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.card{background:transparent;border:1px solid rgba(255,200,150,.2);border-radius:var(--r);padding:11px 13px;display:flex;flex-direction:column;gap:3px;}
.card.full{grid-column:1/-1;}.card.al{border-color:rgba(240,192,64,.45);}
.cl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);}
.cv{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;line-height:1;}
.cv2{font-size:13px;color:#fff;margin-top:1px;}
.du{color:#8edb7e;font-size:11px;}.dd{color:#f09080;font-size:11px;}
.bok,.bw,.bn{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;display:inline-block;margin-top:3px;}
.bok{background:rgba(40,110,20,.45);color:#8edb7e;border:1px solid rgba(70,160,40,.3);}
.bw{background:rgba(110,60,5,.5);color:var(--am);border:1px solid rgba(160,110,10,.35);}
.bn{background:rgba(110,18,18,.5);color:#f09080;border:1px solid rgba(160,45,35,.35);}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.qb{flex:1;min-width:75px;border:1px solid var(--ln);border-radius:8px;background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;font-size:11px;padding:8px 4px;text-align:center;}
.qb:active{border-color:var(--or);color:#fff;}
.sc{background:transparent;border:1px solid rgba(255,200,150,.2);border-radius:var(--r);padding:13px;margin-bottom:10px;}
.st{font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;margin-bottom:10px;}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.lb2{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);}
.inp{background:rgba(0,0,0,.15);border:1px solid rgba(255,200,150,.2);border-radius:8px;color:#fff;font-family:inherit;font-size:16px;padding:10px 11px;width:100%;outline:none;}
.inp:focus{border-color:var(--or);}.inp::placeholder{color:rgba(255,200,150,.3);}
.ir{display:flex;gap:7px;}.ir .inp{flex:1;}
.ab{background:var(--or);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:10px 15px;white-space:nowrap;}
.ab.full{width:100%;margin-top:4px;padding:12px;}.ab.sec{background:rgba(255,255,255,.08);border:1px solid var(--ln);}
.ll{display:flex;flex-direction:column;gap:5px;}
.row{background:transparent;border:1px solid rgba(255,200,150,.2);border-radius:8px;display:flex;justify-content:space-between;align-items:center;padding:10px 12px;gap:8px;}
.rl{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.rla{font-size:13px;color:#fff;}.rsu{font-size:10px;color:var(--mu);}
.rr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rda{font-size:11px;color:var(--mu);cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px;}
.dl{background:rgba(255,255,255,.06);border:1px solid var(--ln);border-radius:6px;color:var(--mu);cursor:pointer;font-size:12px;padding:4px 8px;}
.dl:active{color:#f09080;}
.emp{color:var(--mu);font-size:12px;text-align:center;padding:20px 0;font-style:italic;}
.uvb{background:rgba(110,60,5,.6);border:1px solid rgba(240,192,64,.4);border-radius:var(--r);padding:10px 13px;margin-bottom:10px;font-size:12px;color:var(--am);}
.ib2{background:transparent;border-radius:8px;padding:9px 11px;margin-bottom:9px;font-size:12px;color:var(--t2);line-height:1.7;border:1px solid rgba(255,200,150,.18);}
input[type=date],input[type=month]{cursor:pointer;color-scheme:dark;}
.carousel-wrap{position:relative;margin-bottom:10px;}
.carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;border-radius:var(--r);border:1px solid var(--ln);}
.carousel::-webkit-scrollbar{display:none;}
.carousel-slide{flex-shrink:0;width:100%;scroll-snap-align:start;position:relative;}
.carousel-slide img{width:100%;height:220px;object-fit:cover;border-radius:var(--r);display:block;}
.carousel-empty{width:100%;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mu);font-size:12px;background:var(--glass);border-radius:var(--r);}
.c-add{position:absolute;bottom:10px;right:10px;background:rgba(232,112,58,.88);border:none;border-radius:99px;color:#fff;padding:7px 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
.c-del{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.55);border:none;border-radius:99px;color:var(--t2);padding:7px 12px;font-family:inherit;font-size:12px;cursor:pointer;}
.c-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));border-radius:0 0 var(--r) var(--r);padding:18px 12px 8px;font-size:11px;color:rgba(255,210,170,.9);text-align:center;pointer-events:none;}
.c-count{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.55);border-radius:99px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,.85);}
.carousel-dots{display:flex;justify-content:center;gap:5px;margin-top:7px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,200,150,.2);transition:all .25s;}
.dot.act{background:var(--or);width:16px;border-radius:3px;}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.gthumb{position:relative;cursor:pointer;border-radius:8px;overflow:hidden;aspect-ratio:1;border:1px solid var(--ln);}
.gthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.gthumb-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:10px 4px 4px;font-size:9px;color:rgba(255,210,170,.85);text-align:center;}
.add-photo-btn{aspect-ratio:1;border:2px dashed rgba(255,200,150,.22);border-radius:8px;background:rgba(0,0,0,.2);color:var(--mu);cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;}
.add-photo-btn span{font-size:10px;font-family:inherit;}
#date-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:88;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
#date-modal.show{display:flex;}
.modal-box{background:#1a0d06;border:1px solid rgba(255,200,150,.2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;margin-bottom:14px;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:99;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#lightbox.show{display:flex;}
#lightbox img{max-width:94vw;max-height:72vh;border-radius:12px;object-fit:contain;}
.lb-date{font-size:12px;color:var(--mu);}
.lb-btns{display:flex;gap:10px;}
.lb-del{background:rgba(210,60,50,.55);border:1px solid rgba(210,60,50,.4);color:#fff;font-size:13px;padding:10px 22px;border-radius:99px;cursor:pointer;font-family:inherit;}
.lb-close{background:rgba(255,255,255,.12);border:1px solid var(--ln);color:#fff;font-size:13px;padding:10px 22px;border-radius:99px;cursor:pointer;font-family:inherit;}
</style>
</head>

const KEY="cham_v8";
const blank={name:"Yoshi",uvDate:"",birthdate:"",weightLog:[],feedLog:[],moltLog:[],bathLog:[],vitaminLog:[],photos:[],substrateLog:[],moltBathGiven:false,moltBathLog:[],reschedules:[]};
let data=JSON.parse(localStorage.getItem(KEY)||"null")||{...blank};
if(!data.photos)data.photos=[];
if(!data.substrateLog)data.substrateLog=[];
if(data.birthdate===undefined)data.birthdate="";
const save=()=>localStorage.setItem(KEY,JSON.stringify(data));
const fd=iso=>iso?new Date(iso).toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"}):"—";
const ds=iso=>{if(!iso)return null;const a=new Date(iso);const b=new Date();const aDay=new Date(a.getFullYear(),a.getMonth(),a.getDate());const bDay=new Date(b.getFullYear(),b.getMonth(),b.getDate());return Math.round((bDay-aDay)/86400000);};
const ms=iso=>iso?((Date.now()-new Date(iso))/(86400000*30.44)).toFixed(1):null;
const today=()=>new Date().toISOString().slice(0,10);
const isoFromDate=d=>new Date(d+"T12:00:00").toISOString();
function calcAge(birthdate){
  if(!birthdate)return null;
  // supports "YYYY-MM" or "YYYY-MM-DD"
  const parts=birthdate.split("-");
  const year=parseInt(parts[0]);
  const month=parseInt(parts[1])-1;
  const day=parts[2]?parseInt(parts[2]):1;
  const b=new Date(year,month,day);
  const now=new Date();
  let years=now.getFullYear()-b.getFullYear();
  let months=now.getMonth()-b.getMonth();
  if(months<0){years--;months+=12;}
  if(parts[2]&&now.getDate()<b.getDate()&&months>0)months--;
  if(months<0){years--;months+=11;}
  return{years,months};
}

const TABS=[
  {id:"dash",icon:"◈",label:"Resumo"},
  {id:"weight",icon:"⚖",label:"Peso"},
  {id:"feed",icon:"🦗",label:"Plano Alimentar"},
  {id:"molt",icon:"✦",label:"Muda"},
  {id:"bath",icon:"◉",label:"Banho"},
  {id:"vitamins",icon:"✿",label:"Vitaminas"},
  {id:"substrate",icon:"🪨",label:"Substrato"},
  {id:"uv",icon:"☀",label:"UV"},
  {id:"gallery",icon:"📸",label:"Galeria"},
  {id:"historico",icon:"📋",label:"Histórico"},
  {id:"settings",icon:"⚙",label:"Definições"},
];
let tab="dash";
let lbIdx=-1;
let modalField=null,modalIdx=null;

// ── Toast ──
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── Modal date editor ──
function openModal(field,idx,currentDate){
  modalField=field;modalIdx=idx;
  document.getElementById("modal-title").textContent="Alterar data";
  document.getElementById("modal-date").value=currentDate?currentDate.slice(0,10):today();
  document.getElementById("date-modal").classList.add("show");
}
function closeModal(){document.getElementById("date-modal").classList.remove("show");modalField=null;modalIdx=null;}
function saveModalDate(){
  const val=document.getElementById("modal-date").value;
  if(!val){closeModal();return;}
  if(modalField==="uvDate"){data.uvDate=val;}
  else{data[modalField][modalIdx].date=isoFromDate(val);}
  save();closeModal();render();toast("📅 Data actualizada!");
}

// ── Badges ──
function bdg(days,warn,alt){
  if(days===null)return'<span class="bn">Nunca</span>';
  if(days===0)return'<span class="bok">Hoje</span>';
  if(alt||days>warn)return`<span class="bw">${days}d atrás</span>`;
  return`<span class="bok">${days}d atrás</span>`;
}

// ── Rows with edit date ──
function row(label,sub,date,field,idx){
  const dateStr=date?date.slice(0,10):today();
  return`<div class="row">
    <div class="rl"><span class="rla">${label}</span>${sub?`<span class="rsu">${sub}</span>`:""}</div>
    <div class="rr">
      <span class="rda" onclick="openModal('${field}',${idx},'${dateStr}')" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px">${fd(date)}</span>
      <button class="dl" onclick="del('${field}',${idx})">✕</button>
    </div>
  </div>`;
}
function del(field,idx){data[field].splice(idx,1);save();render();}

// ── Next bar ──
function renderNextBar(){
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;
  const lM=data.moltLog[0]?.date||null,lF=data.feedLog[0]?.date||null;
  const rM=lM&&ds(lM)<=45;
  const moltBathNeeded=rM&&!data.moltBathGiven;
  function ni(icon,lbl,last,interval,field,overrideCls,overrideTxt){
    const r=last?interval-ds(last):null;
    const cls=overrideCls||(r===null?"late":r>3?"ok":r>=0?"warn":"late");
    const txt=overrideTxt||(r===null?"Nunca":r>0?`em ${r}d`:r===0?"Hoje!":`${Math.abs(r)}d atr.`);
    return`<div class="ni2 ${cls}" onclick="setTab('${field}')"><span class="ni2-ic">${icon}</span><span class="ni2-lb">${lbl}</span><span class="ni2-d">${txt}</span></div>`;
  }
  const lW2=data.weightLog[0]?.date||null;
  const lS=data.substrateLog[0]?.date||null;
  // Banho suplementar de muda aparece como aviso separado se necessário
  const bathNi=moltBathNeeded
    ? ni("🛁","Banho muda",null,0,"bath","warn","Agora!")
    : ni("◉","Banho",lB,30,"bath");
  document.getElementById("next-bar").innerHTML=
    ni("⚖","Peso",lW2,14,"weight")+
    ni("🦗","Alimentação",lF,1,"feed")+
    bathNi+
    ni("✿","Vitaminas",lV,7,"vitamins")+
    ni("🪨","Substrato",lS,90,"substrate");
}

// ── Carousel ──
function buildCarousel(){
  const p=data.photos;
  if(!p.length)return`<div class="carousel-wrap"><div class="carousel"><div class="carousel-slide"><div class="carousel-empty"><span>📸</span>Adiciona fotos do Yoshi!</div></div></div><button class="c-add" onclick="document.getElementById('photo-input').click()">+ Foto</button></div>`;
  const slides=p.map((ph,i)=>`<div class="carousel-slide"><img src="${ph.src}" alt="Yoshi" onclick="openPhoto(${i})"/><button class="c-del" onclick="delCarouselPhoto(${i})">🗑</button>${p.length>1?`<div class="c-count">${i+1}/${p.length}</div>`:""}<div class="c-date">${fd(ph.date)}</div></div>`).join("");
  const dots=p.length>1?`<div class="carousel-dots">${p.map((_,i)=>`<div class="dot${i===0?" act":""}" id="dot-${i}"></div>`).join("")}</div>`:"";
  return`<div class="carousel-wrap"><div class="carousel" id="carousel" onscroll="updateDots()">${slides}</div>${dots}<button class="c-add" onclick="document.getElementById('photo-input').click()">+ Foto</button></div>`;
}
function updateDots(){const c=document.getElementById("carousel");if(!c)return;const idx=Math.round(c.scrollLeft/c.offsetWidth);document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("act",i===idx));}
function delCarouselPhoto(i){data.photos.splice(i,1);save();render();toast("🗑 Foto apagada!");}
function openPhoto(idx){lbIdx=idx;document.getElementById("lb-img").src=data.photos[idx].src;document.getElementById("lb-date").textContent=fd(data.photos[idx].date);document.getElementById("lightbox").classList.add("show");}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");}
function deletePhoto(){if(lbIdx<0)return;data.photos.splice(lbIdx,1);save();closeLightbox();render();toast("🗑 Foto apagada!");}
function addPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const max=900;let w=img.width,h=img.height;
      if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      data.photos=[{id:Date.now(),src:canvas.toDataURL("image/jpeg",.72),date:new Date().toISOString()},...data.photos];
      save();render();toast("📸 Foto adicionada!");
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);e.target.value="";
}

// ── Render ──
function render(){
  // Update avatar dynamically
  const hpImg=document.getElementById("hp-img");
  if(hpImg){hpImg.src=data.avatar||DEFAULT_AVATAR;}
  // update header
  document.getElementById("hdr-name").textContent=data.name||"Yoshi";
  const age=calcAge(data.birthdate);
  if(age){
    const parts=[];
    if(age.years>0)parts.push(`${age.years} ano${age.years!==1?"s":""}`);
    if(age.months>0)parts.push(`${age.months} ${age.months!==1?"meses":"mês"}`);
    document.getElementById("hdr-age").textContent=parts.length?parts.join(" e "):"Recém-nascido";
  } else {
    document.getElementById("hdr-age").textContent="Ficha de Seguimento";
  }
  renderNextBar();
  document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="nb${tab===t.id?" act":""}" onclick="setTab('${t.id}')"><span class="ni">${t.icon}</span>${t.label}</button>`).join("");
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;

function setTab(t){tab=t;haptic([20]);render();}
function addWeight(){const v=parseFloat(document.getElementById("wv")?.value);if(!v||v<=0)return;data.weightLog=[{id:Date.now(),date:new Date().toISOString(),value:v},...data.weightLog];save();render();haptic([30,20,30]);toast("⚖ Peso registado!");}
function addFeed(){const q=parseInt(document.getElementById("fq")?.value);const d2=document.getElementById("fd2")?.value||today();const t=document.getElementById("ftype")?.value||"🦗 Grillons";if(!q||q<=0)return;data.feedLog=[{id:Date.now(),date:isoFromDate(d2),qty:q,type:t},...data.feedLog];save();render();haptic([30,20,30]);toast("🦗 Refeição registada!");}
function addFeed_today(){data.feedLog=[{id:Date.now(),date:new Date().toISOString(),qty:7,type:"🦗 Grillons"},...data.feedLog];save();render();haptic([30,20,30]);toast("✅ Alimentação marcada!");}
function reschedule(insect){
  if(!data.reschedules)data.reschedules=[];
  const existing=data.reschedules.find(r=>r.insect===insect);
  const insectDays={"🐝 Dolas":"Quinta","🐛 Teignes":"Sábado","🦟 Gafanhotos":"Terça"};
  const dayNames=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  if(!existing){
    // Primeira vez — reagenda para amanhã
    data.reschedules.push({insect,date:Date.now(),targetDay:"amanhã",attempt:1});
    save();render();haptic([20,10,20]);toast(insect+" reagendado para amanhã!");
  } else if(existing.attempt===1){
    // Segunda vez — reagenda para o dia certo do plano
    const targetDay=insectDays[insect]||"próxima semana";
    const targetDow=dayNames.indexOf(targetDay);
    let daysUntil=7;
    if(targetDow>=0){const tod=new Date().getDay();daysUntil=((targetDow-tod)+7)%7||7;}
    existing.targetDay=targetDay+" (daqui a "+daysUntil+" dias)";
    existing.attempt=2;
    existing.date=Date.now();
    save();render();haptic([20,10,20]);toast(insect+" reagendado para "+targetDay+"!");
  } else {
    toast("Já reagendado para o dia do plano!");
  }
}
function removeReschedule(i){if(!data.reschedules)return;data.reschedules.splice(i,1);save();render();}
function addMolt(){
  data.moltLog=[{id:Date.now(),date:new Date().toISOString()},...data.moltLog];
  data.moltBathGiven=false; // reset molt bath flag
  save();render();haptic([50,30,50,30,100]);confetti();
  setTimeout(()=>toast("🎉 Muda registada! Dá um banho ao Yoshi! 🛁"),300);
}
function addBath(){
  const lM=data.moltLog[0]?.date||null;

    data.bathLog=[{id:Date.now(),date:new Date().toISOString()},...data.bathLog];

  }
}

function downloadHistorico(){
  const d=new Date().toISOString().slice(0,10);
  const age=calcAge(data.birthdate);
  const ageStr=age?(()=>{const p=[];if(age.years>0)p.push(`${age.years} ano${age.years!==1?"s":""}`);if(age.months>0)p.push(`${age.months} mês/meses`);return p.join(" e ")||"<1 mês";})():"—";
  let txt=`YOSHI 🦎 — FICHA DE SEGUIMENTO\n`;
  txt+=`Furcifer pardalis · Ambilobe Blue Bar\n`;
  txt+=`Idade: ${ageStr}\n`;
  txt+=`Gerado em: ${fd(new Date().toISOString())}\n`;
  txt+=`${"─".repeat(40)}\n\n`;

  const cats=[
    {icon:"✦",label:"MUDA",entries:data.moltLog,val:e=>"Muda registada"},
    {icon:"🦗",label:"LARVAS",entries:data.feedLog,val:e=>`${e.qty} larvas`},
    {icon:"◉",label:"BANHO",entries:data.bathLog,val:e=>"Banho dado"},
    {icon:"✿",label:"VITAMINAS",entries:data.vitaminLog,val:e=>"Vitaminas dadas"},
    {icon:"⚖",label:"PESO",entries:data.weightLog,val:e=>`${e.value}g`},
    {icon:"🪨",label:"SUBSTRATO",entries:data.substrateLog,val:e=>"Substrato trocado"},
  ];
  cats.forEach(c=>{
    txt+=`${c.icon} ${c.label} (${c.entries.length} registos)\n`;
    if(!c.entries.length){txt+="  — Sem registos\n";}
    else{c.entries.forEach(e=>{txt+=`  ${fd(e.date)}  →  ${c.val(e)}\n`;});}
    txt+="\n";
  });
  txt+=`${"─".repeat(40)}\n`;
  txt+=`Total: ${cats.reduce((s,c)=>s+c.entries.length,0)} registos · ${data.photos.length} fotos\n`;

  const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`yoshi-historico-${d}.txt`;a.click();
  URL.revokeObjectURL(url);
  haptic([30,20,30]);
  toast("📄 Histórico descarregado!");
}
function exportBackup(){
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  const d=new Date().toISOString().slice(0,10);
  a.download=`yoshi-backup-${d}.json`;
  a.click();
  URL.revokeObjectURL(url);
  haptic([30,20,30]);
  toast("✅ Backup exportado!");
}
function importBackup(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(!imported.weightLog&&!imported.feedLog)throw new Error("Ficheiro inválido");
      data={...blank,...imported};
      save();
      render();
      haptic([50,30,50]);
      toast("✅ Backup restaurado com sucesso!");
    }catch(err){
      toast("❌ Ficheiro de backup inválido.");
    }
  };
  reader.readAsText(file);
  e.target.value="";
}

// ── Confetti ──
function confetti(){
  const canvas=document.createElement("canvas");
  canvas.style.cssText="position:fixed;inset:0;width:100%;height:100%;z-index:500;pointer-events:none;";
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const pieces=[];
  const colors=["#e8703a","#f2a06a","#f0c040","#7edb6e","#7ab5b0","#fff","#f09080"];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*canvas.height*0.5,
      r:4+Math.random()*6,
      d:2+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      tilt:Math.random()*10-5,
      tiltV:0.15+Math.random()*0.15,
      shape:Math.random()>0.5?"circle":"rect",
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*6,
    });
  }
  let frame=0;
  const max=160;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.globalAlpha=frame<max?1:Math.max(0,1-(frame-max)/40);
      if(p.shape==="circle"){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
      ctx.restore();
      p.y+=p.d+(frame/60);
      p.x+=Math.sin(frame*0.02+p.tilt)*1.5;
      p.rot+=p.rotV;
      p.tilt+=p.tiltV;
    });
    frame++;
    if(frame<max+40)requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

render();

// ── Notifications toggle ──
let notifEnabled=localStorage.getItem('notif')==='1';
function updateNotifBtn(){
  const btn=document.getElementById('notif-btn');
  btn.textContent=notifEnabled?'🔔':'🔕';
  btn.style.background=notifEnabled?'rgba(232,112,58,.25)':'rgba(255,255,255,.08)';
  btn.style.borderColor=notifEnabled?'rgba(232,112,58,.5)':'rgba(255,200,150,.15)';
}
updateNotifBtn();
async function toggleNotif(){
  if(Notification.permission==='granted'){
    notifEnabled=!notifEnabled;
    localStorage.setItem('notif',notifEnabled?'1':'0');
    updateNotifBtn();
    toast(notifEnabled?'🔔 Notificações activadas!':'🔕 Notificações desactivadas.');
  } else {
    const p=await Notification.requestPermission();
    if(p==='granted'){notifEnabled=true;localStorage.setItem('notif','1');updateNotifBtn();toast('🔔 Notificações activadas!');}
    else{toast('🔕 Permissão negada.');}
  }
}
function checkNotifications(){
  if(!notifEnabled||Notification.permission!=='granted')return;
  const now=new Date();if(now.getHours()<11)return;
  const todayStr=today();
  if(localStorage.getItem('lastNotifCheck')===todayStr)return;
  localStorage.setItem('lastNotifCheck',todayStr);
  const lM=data.moltLog[0]?.date||null,rM=lM&&ds(lM)<=45;
  [{f:'weightLog',l:'Peso',i:14},{f:'feedLog',l:'Larvas',i:7},
   {f:'bathLog',l:'Banho',i:rM?15:30},{f:'vitaminLog',l:'Vitaminas',i:7},
   {f:'substrateLog',l:'Substrato',i:90}].forEach(c=>{
    const last=data[c.f][0]?.date||null;if(!last)return;
    const r=c.i-ds(last);
    if(r===0)new Notification('Yoshi 🦎',{body:`Hoje é dia de ${c.l}!`});
    else if(r===1)new Notification('Yoshi 🦎',{body:`Amanhã é dia de ${c.l}.`});
  });
}
checkNotifications();
