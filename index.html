*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --or:#e8703a;--lt:#f2a06a;--am:#f0c040;--rd:#d95040;
  --ok:#6db85a;--okbg:rgba(40,100,20,.4);--okbr:rgba(80,160,50,.3);
  --warnbg:rgba(110,70,5,.4);--warnbr:rgba(180,120,10,.3);
  --latebg:rgba(110,20,20,.4);--latebr:rgba(180,50,40,.3);
  --glass:rgba(8,4,2,.32);--glassh:rgba(8,4,2,.22);
  --ln:rgba(255,200,150,.14);--lnb:rgba(255,200,150,.22);
  --tx:#fff;--t2:rgba(255,210,170,.75);--mu:rgba(255,200,150,.5);
}

.mist{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.ml{position:absolute;border-radius:50%;filter:blur(40px);mix-blend-mode:screen;}
.ml:nth-child(1){width:70%;height:45%;top:5%;left:-20%;background:radial-gradient(ellipse,rgba(255,255,255,.13) 0%,rgba(220,240,230,.06) 50%,transparent 70%);animation:mist1 22s ease-in-out infinite;opacity:.8;}
.ml:nth-child(2){width:80%;height:35%;top:25%;left:-30%;background:radial-gradient(ellipse,rgba(255,240,220,.10) 0%,rgba(200,220,210,.05) 50%,transparent 70%);animation:mist2 28s ease-in-out infinite;opacity:.65;filter:blur(50px);}
.ml:nth-child(3){width:60%;height:40%;top:50%;left:-15%;background:radial-gradient(ellipse,rgba(255,255,255,.09) 0%,transparent 65%);animation:mist3 35s ease-in-out infinite;opacity:.55;filter:blur(45px);}
.ml:nth-child(4){width:75%;height:30%;top:70%;left:-40%;background:radial-gradient(ellipse,rgba(200,230,220,.08) 0%,transparent 70%);animation:mist1 20s ease-in-out infinite reverse;opacity:.45;filter:blur(55px);}
.ml:nth-child(5){width:50%;height:50%;top:-10%;left:30%;background:radial-gradient(ellipse,rgba(255,255,255,.07) 0%,transparent 65%);animation:mist2 30s ease-in-out infinite reverse;opacity:.4;filter:blur(60px);}
@keyframes mist1{
  0%  {transform:translateX(0%)   scaleY(1)    scaleX(1);}
  20% {transform:translateX(12%)  scaleY(1.15) scaleX(0.95);}
  50% {transform:translateX(32%)  scaleY(0.9)  scaleX(1.1);}
  75% {transform:translateX(55%)  scaleY(1.05) scaleX(0.98);}
  100%{transform:translateX(75%)  scaleY(1)    scaleX(1);}
}
@keyframes mist2{
  0%  {transform:translateX(0%)   scaleY(0.9)  scaleX(1);}
  30% {transform:translateX(20%)  scaleY(1.2)  scaleX(0.9);}
  60% {transform:translateX(45%)  scaleY(0.85) scaleX(1.15);}
  100%{transform:translateX(80%)  scaleY(0.95) scaleX(1);}
}
@keyframes mist3{
  0%  {transform:translateX(0%)   scaleY(1.05) scaleX(1);}
  40% {transform:translateX(25%)  scaleY(0.8)  scaleX(1.2);}
  70% {transform:translateX(50%)  scaleY(1.1)  scaleX(0.9);}
  100%{transform:translateX(78%)  scaleY(1)    scaleX(1.05);}
}

/* floating particles */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);animation:float linear infinite;}
@keyframes float{
  0%  {transform:translateY(100vh) translateX(0px) scale(0);opacity:0;}
  10% {opacity:1;}
  90% {opacity:.6;}
  100%{transform:translateY(-20px) translateX(var(--dx)) scale(1);opacity:0;}
}
#ov{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.35));z-index:2;}
#app{position:relative;z-index:3;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}

/* install banner */
#ib{display:none;background:linear-gradient(135deg,rgba(232,112,58,.95),rgba(200,80,20,.95));backdrop-filter:blur(12px);padding:12px 16px;align-items:center;gap:10px;border-bottom:1px solid rgba(255,200,150,.2);}
#ib p{flex:1;font-size:12px;color:#fff;line-height:1.4;}
#ib .ibtn{background:#fff;color:#e8703a;border:none;border-radius:8px;padding:7px 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
#db{background:none!important;color:rgba(255,255,255,.6)!important;padding:4px 8px!important;font-size:18px!important;}

/* toast */
.toast{position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-20px);
  background:linear-gradient(135deg,#e8703a,#c84e1e);color:#fff;font-size:13px;font-weight:600;
  padding:9px 24px;border-radius:99px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;
  box-shadow:0 8px 24px rgba(232,112,58,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* header */
.hdr{background:rgba(6,3,1,.4);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--ln);
  padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
  display:flex;align-items:center;gap:14px;}
.hp{width:56px;height:56px;border-radius:50%;object-fit:cover;object-position:center 15%;
  border:2px solid var(--or);box-shadow:0 0 0 4px rgba(232,112,58,.15),0 8px 24px rgba(0,0,0,.4);
  flex-shrink:0;transition:transform .2s;}
.hp:active{transform:scale(.95);}
.hn{font-family:'Cormorant Garamond',serif;font-size:23px;color:#fff;line-height:1.1;letter-spacing:.01em;}
.hs{font-size:10px;color:var(--mu);margin-top:3px;letter-spacing:.12em;text-transform:uppercase;}
.hdr-right{margin-left:auto;display:flex;gap:8px;}
.notif-btn{background:rgba(255,255,255,.08);border:1px solid var(--ln);border-radius:10px;
  color:var(--t2);padding:6px 10px;font-size:16px;cursor:pointer;transition:all .2s;}
.notif-btn:active{background:rgba(232,112,58,.2);border-color:var(--or);}

/* next bar */
#next-bar{background:rgba(4,2,1,.38);backdrop-filter:blur(12px);border-bottom:1px solid var(--ln);
  padding:9px 12px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
#next-bar::-webkit-scrollbar{display:none;}
.ni2{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;
  border-radius:12px;padding:7px 12px;min-width:72px;cursor:pointer;transition:all .2s;
  background:rgba(255,255,255,.06);border:1px solid var(--ln);}
.ni2:active{transform:scale(.96);}
.ni2.ok{background:var(--okbg);border-color:var(--okbr);}
.ni2.warn{background:var(--warnbg);border-color:var(--warnbr);}
.ni2.late{background:var(--latebg);border-color:var(--latebr);}
.ni2-ic{font-size:15px;}.ni2-lb{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;}
.ni2-d{font-size:11px;font-weight:500;}
.ni2.ok .ni2-d{color:#8edb7e;}.ni2.warn .ni2-d{color:var(--am);}.ni2.late .ni2-d{color:#f09080;}

/* nav */
.nav{background:rgba(4,2,1,.4);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--ln);display:flex;overflow-x:auto;padding:6px 8px;gap:3px;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;background:none;border:1px solid transparent;border-radius:10px;
  color:var(--mu);cursor:pointer;font-family:inherit;font-size:10px;
  padding:6px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;}
.nb .ni{font-size:15px;}.nb:active{transform:scale(.95);}
.nb.act{background:rgba(232,112,58,.18);border-color:rgba(232,112,58,.5);color:#fff;
  box-shadow:0 0 12px rgba(232,112,58,.15);}

/* main */
.main{flex:1;padding:14px;max-width:640px;margin:0 auto;width:100%;
  padding-bottom:calc(14px + env(safe-area-inset-bottom));}

/* cards */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--ln);border-radius:16px;padding:13px 14px;
  display:flex;flex-direction:column;gap:4px;transition:all .2s;
  box-shadow:0 4px 20px rgba(0,0,0,.2);}
.card.full{grid-column:1/-1;}
.card.al{border-color:rgba(240,192,64,.45);box-shadow:0 4px 20px rgba(240,192,64,.1);}
.cl{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--mu);}
.cv{font-family:'Cormorant Garamond',serif;font-size:30px;color:#fff;line-height:1;}
.cv2{font-size:13px;color:#fff;margin-top:1px;}
.du{color:#8edb7e;font-size:11px;}.dd{color:#f09080;font-size:11px;}

/* badges */
.bok,.bw,.bn{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:500;display:inline-block;margin-top:4px;}
.bok{background:var(--okbg);color:#8edb7e;border:1px solid var(--okbr);}
.bw{background:var(--warnbg);color:var(--am);border:1px solid var(--warnbr);}
.bn{background:var(--latebg);color:#f09080;border:1px solid var(--latebr);}

/* quick btns */
.quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.qb{flex:1;min-width:75px;border:1px solid var(--ln);border-radius:10px;
  background:var(--glassh);color:var(--t2);cursor:pointer;
  font-family:inherit;font-size:11px;padding:9px 4px;text-align:center;transition:all .2s;}
.qb:active{border-color:var(--or);color:#fff;background:rgba(232,112,58,.22);transform:scale(.97);}

/* section cards */
.sc{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--ln);
  border-radius:16px;padding:14px;margin-bottom:11px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.st{font-family:'Cormorant Garamond',serif;font-size:19px;color:#fff;margin-bottom:12px;letter-spacing:.01em;}

/* inputs */
.fi{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.lb2{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mu);}
.inp{background:rgba(4,2,1,.45);border:1px solid var(--lnb);border-radius:10px;
  color:#fff;font-family:inherit;font-size:16px;padding:11px 13px;width:100%;outline:none;
  transition:all .2s;-webkit-appearance:none;}
.inp:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(232,112,58,.12);}
.inp::placeholder{color:rgba(255,200,150,.28);}
.ir{display:flex;gap:8px;}.ir .inp{flex:1;}
.ab{background:linear-gradient(135deg,#e8703a,#c84e1e);color:#fff;border:none;border-radius:10px;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:11px 18px;
  white-space:nowrap;box-shadow:0 6px 18px rgba(232,112,58,.35);transition:all .2s;-webkit-appearance:none;}
.ab:active{opacity:.88;transform:scale(.97);}
.ab.full{width:100%;margin-top:4px;padding:13px;}
.ab.sec{background:rgba(255,255,255,.08);box-shadow:none;border:1px solid var(--lnb);}

/* log rows */
.ll{display:flex;flex-direction:column;gap:6px;}
.row{background:var(--glassh);backdrop-filter:blur(12px);border:1px solid var(--ln);
  border-radius:12px;display:flex;justify-content:space-between;align-items:center;
  padding:11px 13px;gap:8px;transition:all .2s;animation:fadeUp .2s ease;}
.rl{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.rla{font-size:13px;color:#fff;font-weight:500;}.rsu{font-size:10px;color:var(--mu);}
.rr{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rda{font-size:11px;color:var(--mu);}
.dl{background:rgba(255,255,255,.06);border:1px solid var(--ln);border-radius:8px;
  color:var(--mu);cursor:pointer;font-size:13px;padding:5px 9px;transition:all .2s;}
.dl:active{color:#f09080;background:rgba(210,60,50,.2);}

async function requestNotifications(){
  if(!('Notification' in window)){toast('Notificações não suportadas neste browser.');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    notifEnabled=true;
    localStorage.setItem('notif','1');
    updateNotifBtn();
    toast('🔔 Notificações activadas!');
    scheduleNotifications();
  } else {
    notifEnabled=false;
    localStorage.setItem('notif','0');
    updateNotifBtn();
    toast('🔕 Notificações desactivadas.');
  }
}

function showNotification(title,body,tag){
  if(!notifEnabled||Notification.permission!=='granted')return;
  const opts={body,vibrate:[200,100,200],tag:tag||'yoshi',requireInteraction:false};
  if(swReg){swReg.showNotification(title,opts);}
  else{new Notification(title,opts);}
}

function haptic(pattern){

}

function scheduleNotifications(){
  // Only after 11:00
  const now=new Date();
  if(now.getHours()<11){return;}

  // Only show once per day
  const lastCheck=localStorage.getItem('lastNotifCheck')||'';
  const todayStr=today();
  if(lastCheck===todayStr)return;
  localStorage.setItem('lastNotifCheck',todayStr);

  const lM=data.moltLog[0]?.date||null;
  const rM=lM&&ds(lM)<=45;
  const checks=[
    {field:'weightLog',   label:'Peso',      icon:'⚖',  interval:14},
    {field:'feedLog',     label:'Larvas',    icon:'🦗',  interval:7},
    {field:'bathLog',     label:'Banho',     icon:'◉',  interval:rM?15:30},
    {field:'vitaminLog',  label:'Vitaminas', icon:'✿',  interval:7},
    {field:'substrateLog',label:'Substrato', icon:'🪨',  interval:90},
  ];
  checks.forEach(c=>{
    const last=data[c.field][0]?.date||null;
    if(!last)return;
    const elapsed=ds(last);
    const remaining=c.interval-elapsed;
    if(remaining===0){
      showNotification(
        `Yoshi 🦎 — ${c.icon} ${c.label}`,
        `Hoje é dia de ${c.label.toLowerCase()}! Não te esqueças.`,
        c.field
      );
    } else if(remaining===1){
      showNotification(
        `Yoshi 🦎 — ${c.icon} ${c.label}`,
        `Amanhã é dia de ${c.label.toLowerCase()}. Prepara-te!`,
        c.field+'-tomorrow'
      );
    }
  });
}

const ms=iso=>iso?((Date.now()-new Date(iso))/(86400000*30.44)).toFixed(1):null;

const isoFromDate=d=>new Date(d+"T12:00:00").toISOString();
function calcAge(birthdate){
  if(!birthdate)return null;
  // supports "YYYY-MM" or "YYYY-MM-DD"
  const parts=birthdate.split("-");
  const year=parseInt(parts[0]);
  const month=parseInt(parts[1])-1;
  const day=parts[2]?parseInt(parts[2]):1;
  const b=new Date(year,month,day);
  const now=new Date();
  let years=now.getFullYear()-b.getFullYear();
  let months=now.getMonth()-b.getMonth();
  if(months<0){years--;months+=12;}
  if(parts[2]&&now.getDate()<b.getDate()&&months>0)months--;
  if(months<0){years--;months+=11;}
  return{years,months};
}

// ── Next bar ──
function renderNextBar(){
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;
  const lM=data.moltLog[0]?.date||null,lF=data.feedLog[0]?.date||null;
  const rM=lM&&ds(lM)<=45,bW=rM?15:30;
  function ni(icon,lbl,last,interval,field){
    const cls=!last?"late":((interval-ds(last))>3?"ok":(interval-ds(last))>=0?"warn":"late");
    const txt=!last?"Nunca":(interval-ds(last))>0?`em ${interval-ds(last)}d`:(interval-ds(last))===0?"Hoje!":`${Math.abs(interval-ds(last))}d atr.`;
    return`<div class="ni2 ${cls}" onclick="setTab('${field}')"><span class="ni2-ic">${icon}</span><span class="ni2-lb">${lbl}</span><span class="ni2-d">${txt}</span></div>`;
  }
  const lW2=data.weightLog[0]?.date||null;
  const lS=data.substrateLog[0]?.date||null;
  document.getElementById("next-bar").innerHTML=
    ni("⚖","Peso",lW2,14,"weight")+
    ni("🦗","Larvas",lF,7,"feed")+
    ni("◉","Banho",lB,bW,"bath")+
    ni("✿","Vitaminas",lV,7,"vitamins")+
    ni("🪨","Substrato",lS,90,"substrate");
}

// ── Carousel ──
function buildCarousel(){
  const p=data.photos;
  if(!p.length)return`<div class="carousel-wrap"><div class="carousel"><div class="carousel-slide"><div class="carousel-empty"><span>📸</span>Adiciona fotos do Yoshi!</div></div></div><button class="c-add" onclick="document.getElementById('photo-input').click()">+ Foto</button></div>`;
  const slides=p.map((ph,i)=>`<div class="carousel-slide"><img src="${ph.src}" alt="Yoshi" onclick="openPhoto(${i})"/><button class="c-del" onclick="delCarouselPhoto(${i})">🗑</button>${p.length>1?`<div class="c-count">${i+1}/${p.length}</div>`:""}<div class="c-date">${fd(ph.date)}</div></div>`).join("");
  const dots=p.length>1?`<div class="carousel-dots">${p.map((_,i)=>`<div class="dot${i===0?" act":""}" id="dot-${i}"></div>`).join("")}</div>`:"";
  return`<div class="carousel-wrap"><div class="carousel" id="carousel" onscroll="updateDots()">${slides}</div>${dots}<button class="c-add" onclick="document.getElementById('photo-input').click()">+ Foto</button></div>`;
}
function updateDots(){const c=document.getElementById("carousel");if(!c)return;const idx=Math.round(c.scrollLeft/c.offsetWidth);document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("act",i===idx));}
function delCarouselPhoto(i){data.photos.splice(i,1);save();render();toast("🗑 Foto apagada!");}
function openPhoto(idx){lbIdx=idx;document.getElementById("lb-img").src=data.photos[idx].src;document.getElementById("lb-date").textContent=fd(data.photos[idx].date);document.getElementById("lightbox").classList.add("show");}
function closeLightbox(){document.getElementById("lightbox").classList.remove("show");}
function deletePhoto(){if(lbIdx<0)return;data.photos.splice(lbIdx,1);save();closeLightbox();render();toast("🗑 Foto apagada!");}
function addPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const max=900;let w=img.width,h=img.height;
      if(w>max){h=h*(max/w);w=max;}if(h>max){w=w*(max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      data.photos=[{id:Date.now(),src:canvas.toDataURL("image/jpeg",.72),date:new Date().toISOString()},...data.photos];
      save();render();toast("📸 Foto adicionada!");
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);e.target.value="";
}

// ── Render ──
function render(){
  // update header
  document.getElementById("hdr-name").textContent=data.name||"Yoshi";
  const age=calcAge(data.birthdate);
  if(age){
    const parts=[];
    if(age.years>0)parts.push(`${age.years} ano${age.years!==1?"s":""}`);
    if(age.months>0)parts.push(`${age.months} ${age.months!==1?"meses":"mês"}`);

  } else {
    document.getElementById("hdr-age").textContent="Ficha de Seguimento";
  }
  renderNextBar();
  document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="nb${tab===t.id?" act":""}" onclick="setTab('${t.id}')"><span class="ni">${t.icon}</span>${t.label}</button>`).join("");
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;
  const lM=data.moltLog[0]?.date||null,lF=data.feedLog[0]?.date||null;
  const lW=data.weightLog[0]?.value||null,pW=data.weightLog[1]?.value||null;

  let h="";
  if(uvA)h+=`<div class="uvb">☀ Lâmpada UV com ${uvM} meses — substituição recomendada!</div>`;

  if(tab==="dash"){
    h+=buildCarousel();
    h+=`<div class="grid">

      <div class="card"><div class="cl">Larvas</div><div class="cv2">${fd(lF)}</div>${bdg(ds(lF),7)}${data.feedLog[0]?`<div style="font-size:10px;color:var(--mu);margin-top:3px">${data.feedLog[0].qty} larvas</div>`:""}</div>
      <div class="card${bA?" al":""}"><div class="cl">Banho</div><div class="cv2">${fd(lB)}</div>${bdg(bD,bW,bA)}<div style="font-size:10px;color:var(--mu);margin-top:3px">${rM?"2× mês (muda)":"1× mês"}</div></div>

      <div class="card"><div class="cl">Última Muda</div><div class="cv2">${fd(lM)}</div>${lM?`<span class="bok">${ds(lM)}d atrás</span>`:'<span class="bn">Nunca</span>'}<div style="font-size:10px;color:var(--mu);margin-top:3px">sem prazo fixo</div></div>
      <div class="card${data.substrateLog[0]&&ds(data.substrateLog[0].date)>90?" al":""}"><div class="cl">Substrato</div><div class="cv2">${fd(data.substrateLog[0]?.date||null)}</div>${bdg(ds(data.substrateLog[0]?.date||null),90)}<div style="font-size:10px;color:var(--mu);margin-top:3px">trocar 3 em 3 meses</div></div>

    </div>`;
  }
  else if(tab==="weight"){
    // build SVG chart
    const wData=[...data.weightLog].reverse();
    let chartHtml="";
    if(wData.length>=2){
      const W=320,H=120,pad={t:16,r:12,b:28,l:36};
      const vals=wData.map(e=>e.value);
      const minV=Math.min(...vals),maxV=Math.max(...vals);
      const span=maxV-minV||1;
      const cx=(i)=>pad.l+(i/(wData.length-1))*(W-pad.l-pad.r);
      const cy=(v)=>pad.t+(1-(v-minV)/span)*(H-pad.t-pad.b);
      const pts=wData.map((e,i)=>`${cx(i)},${cy(e.value)}`).join(" ");
      const areaBottom=H-pad.b;
      const areaPts=`${cx(0)},${areaBottom} `+wData.map((e,i)=>`${cx(i)},${cy(e.value)}`).join(" ")+` ${cx(wData.length-1)},${areaBottom}`;
      // y axis labels
      const yLabels=[minV,minV+span/2,maxV].map(v=>{
        const y=cy(v);
        return`<text x="${pad.l-4}" y="${y+4}" text-anchor="end" fill="rgba(255,200,150,.5)" font-size="9">${v.toFixed(1)}</text>`;

      // x axis labels (first, middle, last)
      const xIdxs=[0,Math.floor((wData.length-1)/2),wData.length-1].filter((v,i,a)=>a.indexOf(v)===i);
      const xLabels=xIdxs.map(i=>{
        const d=new Date(wData[i].date);
        const lbl=d.toLocaleDateString("pt-PT",{day:"2-digit",month:"short"});

      }).join("");
      // grid lines
      const gridLines=[0,.25,.5,.75,1].map(f=>{
        const y=pad.t+f*(H-pad.t-pad.b);
        return`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="rgba(255,200,150,.08)" stroke-width="1"/>`;
      }).join("");
      // dots
      const dots=wData.map((e,i)=>`<circle cx="${cx(i)}" cy="${cy(e.value)}" r="3.5" fill="#e8703a" stroke="#f2a06a" stroke-width="1.5"/>`).join("");
      chartHtml=`<div class="sc" style="padding:14px 10px 10px">
        <div class="cl" style="margin-bottom:8px">Evolução do Peso</div>

            <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e8703a" stop-opacity=".35"/>
              <stop offset="100%" stop-color="#e8703a" stop-opacity="0"/>
            </linearGradient>
          </defs>

          <polygon points="${areaPts}" fill="url(#wg)"/>
          <polyline points="${pts}" fill="none" stroke="#e8703a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
          ${dots}
          ${yLabels}
          ${xLabels}
        </svg>
        <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--t2)">
          <span>Mín: <strong style="color:#fff">${minV}g</strong></span>
          <span>Máx: <strong style="color:#fff">${maxV}g</strong></span>
          ${wd!==null?`<span>Δ última: <strong class="${parseFloat(wd)>=0?"du":"dd"}">${parseFloat(wd)>=0?"+":""}${wd}g</strong></span>`:""}

    }
    h+=`<div class="sc"><div class="st">Registar Peso</div><div class="fi"><div class="lb2">Peso em gramas</div><div class="ir"><input class="inp" type="number" id="wv" min="0" step="0.1" placeholder="ex: 48.5" inputmode="decimal"/><button class="ab" onclick="addWeight()">Adicionar</button></div></div></div>
    ${chartHtml}
    <div class="ll">${data.weightLog.length===0?'<p class="emp">Sem registos de peso.</p>':data.weightLog.map((e,i)=>row(`${e.value} g`,i===0?"mais recente":(i===1&&wd?`Δ ${wd}g`:null),e.date,"weightLog",i)).join("")}</div>`;
  }
  else if(tab==="feed"){
    h+=`<div class="sc"><div class="st">Registar Larvas</div>
      <div class="fi"><div class="lb2">Data da refeição</div><input class="inp" type="date" id="fd2" value="${today()}"/></div>

    </div>
    <div class="ll">${data.feedLog.length===0?'<p class="emp">Sem refeições registadas.</p>':data.feedLog.map((e,i)=>row(`${e.qty} larva${e.qty!==1?"s":""}`,i===0?"mais recente":null,e.date,"feedLog",i)).join("")}</div>`;

  else if(tab==="molt"){
    h+=`<div class="sc"><div class="st">Registar Muda</div>
      <div class="ib2">💡 A muda não tem prazo fixo — regista sempre que acontecer!</div>

    </div>
    <div class="ll">${data.moltLog.length===0?'<p class="emp">Sem mudas registadas.</p>':data.moltLog.map((e,i)=>row(`Muda #${data.moltLog.length-i}`,i===0?"mais recente":null,e.date,"moltLog",i)).join("")}</div>`;

  else if(tab==="bath"){
    const bathsThisMonth=data.bathLog.filter(e=>ds(e.date)<=30).length;

      bathWarnDays=15;
      if(bathsThisMonth===0){
        bathInfo=`<div style="background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.3);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7"><span style="color:var(--am)">✦ Muda activa</span><br/>Dá banho <strong>durante a muda</strong> e se necessário <strong>mais 1 vez</strong> no mês.<br/><span style="color:var(--mu)">Este mês: ${bathsThisMonth}/2 banhos</span></div>`;
      } else if(bathsThisMonth===1){
        bathInfo=`<div style="background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.3);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7"><span style="color:var(--am)">✦ Muda activa</span><br/>Podes dar <strong>mais 1 banho</strong> este mês se necessário.<br/><span style="color:var(--mu)">Este mês: ${bathsThisMonth}/2 banhos</span></div>`;
      } else {
        bathInfo=`<div style="background:rgba(40,100,20,.3);border:1px solid rgba(80,160,50,.3);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7"><span style="color:#8edb7e">✓ Banhos completos este mês</span><br/><span style="color:var(--mu)">Este mês: ${bathsThisMonth}/2 banhos</span></div>`;
      }
    } else {
      bathWarnDays=30;

        bathInfo=`<div style="background:rgba(8,4,2,.3);border:1px solid var(--ln);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7;color:var(--t2)">Sem muda activa — <strong style="color:#fff">1 banho por mês</strong><br/><span style="color:var(--mu)">Este mês: ${bathsThisMonth}/1 banhos</span></div>`;
      } else {
        bathInfo=`<div style="background:rgba(40,100,20,.3);border:1px solid rgba(80,160,50,.3);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7"><span style="color:#8edb7e">✓ Banho do mês feito!</span><br/><span style="color:var(--mu)">Este mês: ${bathsThisMonth}/1 banhos · próximo em ${30-bD}d</span></div>`;
      }

    </div>
    <div class="ll">${data.bathLog.length===0?'<p class="emp">Sem banhos registados.</p>':data.bathLog.map((e,i)=>row(`Banho #${data.bathLog.length-i}`,i===0?"mais recente":null,e.date,"bathLog",i)).join("")}</div>`;
  }
  else if(tab==="uv"){
    const uvM2=data.uvDate?parseFloat(ms(data.uvDate)):null;
    const lS2=data.substrateLog[0]?.date||null;
    const sD=ds(lS2);
    const sA=sD!==null&&sD>90;
    h+=`${uvA?`<div class="uvb">⚠ Lâmpada com ${uvM2} meses — substituir entre 8 e 10 meses!</div>`:""}
    ${sA?`<div class="uvb">⚠ Substrato com ${sD} dias — trocar recomendado!</div>`:""}
    <div class="sc"><div class="st">Data de Nascimento 🎂</div>
      <div class="fi"><div class="lb2">Mês e ano de nascimento</div>

        const a=calcAge(data.birthdate);

    </div>

    <div class="sc" style="font-size:12px;color:var(--mu);line-height:1.9">
      <div class="cl" style="margin-bottom:6px">ℹ Lembretes</div>
      UV-B: substituir entre os <strong style="color:#fff">8 e 10 meses</strong>.<br/>
      Substrato: trocar a cada <strong style="color:#fff">3 meses</strong>.
    </div>`;
  }
  else if(tab==="vitamins"){
    h+=`<div class="sc"><div class="st">Registar Vitaminas</div>
      <div class="ib2">Frequência: <strong>1× por semana</strong></div>
      ${lV?`<p style="font-size:12px;color:var(--t2);margin-bottom:10px">Última: ${fd(lV)} · ${bdg(vD,7,vA)}</p>`:""}
      <button class="ab full" onclick="addVit()">✿ Registar vitaminas agora</button>
    </div>
    <div class="ll">${data.vitaminLog.length===0?'<p class="emp">Sem vitaminas registadas.</p>':data.vitaminLog.map((e,i)=>row(`Vitaminas #${data.vitaminLog.length-i}`,i===0?"mais recente":null,e.date,"vitaminLog",i)).join("")}</div>`;
  }
  else if(tab==="gallery"){
    h+=`<div class="sc"><div class="st">Galeria do Yoshi 📸</div>
      <div class="gallery-grid">
        <button class="add-photo-btn" onclick="document.getElementById('photo-input').click()"><span>➕</span><span>Adicionar</span></button>
        ${data.photos.map((p,i)=>`<div class="gthumb" onclick="openPhoto(${i})"><img src="${p.src}" alt="Yoshi"/><div class="gthumb-date">${fd(p.date)}</div></div>`).join("")}
      </div>
      ${data.photos.length===0?'<p class="emp" style="margin-top:14px">Ainda sem fotos. Adiciona a primeira! 🦎</p>':""}
    </div>`;
  }

  document.getElementById("main").innerHTML=h;
}

function setTab(t){tab=t;haptic([20]);render();}
function addWeight(){const v=parseFloat(document.getElementById("wv")?.value);if(!v||v<=0)return;data.weightLog=[{id:Date.now(),date:new Date().toISOString(),value:v},...data.weightLog];save();render();haptic([30,20,30]);toast("⚖ Peso registado!");}
function addFeed(){const q=parseInt(document.getElementById("fq")?.value);const d2=document.getElementById("fd2")?.value||today();if(!q||q<=0)return;data.feedLog=[{id:Date.now(),date:isoFromDate(d2),qty:q},...data.feedLog];save();render();haptic([30,20,30]);toast("🦗 Larvas registadas!");}
function addMolt(){data.moltLog=[{id:Date.now(),date:new Date().toISOString()},...data.moltLog];save();render();haptic([50,30,50,30,100]);confetti();toast("🎉 Muda registada!");}

// ── Confetti ──
function confetti(){
  const canvas=document.createElement("canvas");
  canvas.style.cssText="position:fixed;inset:0;width:100%;height:100%;z-index:9999;pointer-events:none;";
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const pieces=[];
  const colors=["#e8703a","#f2a06a","#f0c040","#7edb6e","#7ab5b0","#fff","#f09080"];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*canvas.height*0.5,
      r:4+Math.random()*6,
      d:2+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      tilt:Math.random()*10-5,
      tiltV:0.15+Math.random()*0.15,
      shape:Math.random()>0.5?"circle":"rect",
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*6,
    });
  }
  let frame=0;
  const max=160;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.globalAlpha=frame<max?1:Math.max(0,1-(frame-max)/40);
      if(p.shape==="circle"){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
      ctx.restore();
      p.y+=p.d+(frame/60);
      p.x+=Math.sin(frame*0.02+p.tilt)*1.5;
      p.rot+=p.rotV;
      p.tilt+=p.tiltV;
    });
    frame++;
    if(frame<max+40)requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}

render();
</script>
