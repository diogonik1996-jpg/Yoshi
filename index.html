.mist{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.ml{position:absolute;width:260%;height:100%;
  background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(255,255,255,.17) 0%,rgba(200,220,210,.09) 40%,transparent 70%);
  border-radius:50%;filter:blur(28px);}
.ml:nth-child(1){top:-20%;left:-40%;animation:d1 18s ease-in-out infinite;opacity:.7;}
.ml:nth-child(2){top:10%;left:-60%;animation:d2 25s ease-in-out infinite;opacity:.45;
  background:radial-gradient(ellipse 70% 35% at 50% 50%,rgba(220,240,230,.12) 0%,transparent 65%);}
.ml:nth-child(3){top:35%;left:-50%;animation:d3 32s ease-in-out infinite;opacity:.4;filter:blur(36px);}
.ml:nth-child(4){top:60%;left:-70%;animation:d1 22s ease-in-out infinite reverse;opacity:.3;}

@keyframes d1{0%{transform:translateX(0%) scaleY(1);}35%{transform:translateX(24%) scaleY(1.1);}65%{transform:translateX(48%) scaleY(.9);}100%{transform:translateX(72%) scaleY(1);}}
@keyframes d2{0%{transform:translateX(0%) scaleY(.9);}40%{transform:translateX(32%) scaleY(1.15);}100%{transform:translateX(78%) scaleY(.95);}}
@keyframes d3{0%{transform:translateX(0%) scaleY(1.05);}50%{transform:translateX(42%) scaleY(.9);}100%{transform:translateX(76%) scaleY(1.1);}}

#ov{position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.2),rgba(0,0,0,.38));z-index:2;}
#app{position:relative;z-index:3;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}

/* install banner */
#install-banner{display:none;background:rgba(232,112,58,.92);backdrop-filter:blur(10px);
  padding:12px 16px;align-items:center;gap:10px;border-bottom:1px solid rgba(255,200,150,.3);}
#install-banner p{flex:1;font-size:12px;color:#fff;line-height:1.4;}
#install-banner button{background:#fff;color:#e8703a;border:none;border-radius:8px;
  padding:7px 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
#dismiss-btn{background:none!important;color:rgba(255,255,255,.7)!important;padding:4px 8px!important;font-size:18px!important;}

.toast{position:fixed;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:#e8703a;color:#fff;font-size:13px;font-weight:600;padding:7px 22px;
  border-radius:99px;z-index:99;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}

.hdr{background:rgba(0,0,0,.32);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,200,150,.18);
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
  display:flex;align-items:center;gap:12px;}
.hp{width:54px;height:54px;border-radius:50%;object-fit:cover;object-position:center 15%;
  border:2px solid #e8703a;box-shadow:0 0 18px rgba(232,112,58,.5);flex-shrink:0;}
.hn{font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;line-height:1.1;}
.hs{font-size:10px;color:rgba(255,210,170,.6);margin-top:2px;letter-spacing:.1em;text-transform:uppercase;}

.nav{background:rgba(0,0,0,.28);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,200,150,.14);
  display:flex;overflow-x:auto;padding:5px 8px;gap:2px;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;background:none;border:1px solid transparent;border-radius:8px;
  color:rgba(255,210,170,.55);cursor:pointer;font-family:inherit;font-size:10px;
  padding:5px 10px;display:flex;flex-direction:column;align-items:center;gap:1px;transition:all .15s;}
.nb .ni{font-size:14px;}.nb:hover,.nb:active{color:#fff;}
.nb.act{background:rgba(232,112,58,.22);border-color:#e8703a;color:#fff;}

.main{flex:1;padding:13px;max-width:640px;margin:0 auto;width:100%;
  padding-bottom:calc(13px + env(safe-area-inset-bottom));}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.card{background:rgba(0,0,0,.28);backdrop-filter:blur(16px);
  border:1px solid rgba(255,200,150,.16);border-radius:12px;
  padding:11px 13px;display:flex;flex-direction:column;gap:3px;}
.card.full{grid-column:1/-1;}.card.al{border-color:rgba(240,192,64,.5);}
.cl{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,200,150,.55);}
.cv{font-family:'Cormorant Garamond',serif;font-size:28px;color:#fff;line-height:1;}
.cv2{font-size:13px;color:#fff;margin-top:1px;}
.du{color:#a0f080;font-size:11px;}.dd{color:#f09080;font-size:11px;}
.bok,.bw,.bn{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;display:inline-block;margin-top:4px;}
.bok{background:rgba(40,110,20,.45);color:#a0f080;border:1px solid rgba(70,160,40,.3);}
.bw{background:rgba(110,60,5,.5);color:#f5d060;border:1px solid rgba(160,110,10,.35);}
.bn{background:rgba(110,18,18,.5);color:#f09888;border:1px solid rgba(160,45,35,.35);}
.quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
.qb{flex:1;min-width:75px;border:1px solid rgba(255,200,150,.18);border-radius:8px;
  background:rgba(0,0,0,.2);color:rgba(255,210,170,.75);cursor:pointer;
  font-family:inherit;font-size:11px;padding:8px 4px;text-align:center;transition:all .15s;}
.qb:active{border-color:#e8703a;color:#fff;background:rgba(232,112,58,.2);}
.sc{background:rgba(0,0,0,.28);backdrop-filter:blur(16px);
  border:1px solid rgba(255,200,150,.16);border-radius:12px;padding:13px;margin-bottom:10px;}
.st{font-family:'Cormorant Garamond',serif;font-size:18px;color:#fff;margin-bottom:10px;}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.lb{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,200,150,.55);}
.inp{background:rgba(0,0,0,.38);border:1px solid rgba(255,200,150,.2);border-radius:8px;
  color:#fff;font-family:inherit;font-size:16px;padding:10px 11px;width:100%;outline:none;
  transition:border-color .15s;-webkit-appearance:none;}
.inp:focus{border-color:#e8703a;}
.inp::placeholder{color:rgba(255,200,150,.3);}
.ir{display:flex;gap:7px;}.ir .inp{flex:1;}
.ab{background:#e8703a;color:#fff;border:none;border-radius:8px;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:10px 15px;
  white-space:nowrap;box-shadow:0 4px 14px rgba(232,112,58,.3);-webkit-appearance:none;}
.ab:active{opacity:.85;}.ab.full{width:100%;margin-top:4px;padding:12px;}
.ll{display:flex;flex-direction:column;gap:5px;}
.row{background:rgba(0,0,0,.2);backdrop-filter:blur(10px);
  border:1px solid rgba(255,200,150,.12);border-radius:8px;
  display:flex;justify-content:space-between;align-items:center;padding:10px 12px;gap:8px;}
.rl{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;}
.rla{font-size:13px;color:#fff;}.rsu{font-size:10px;color:rgba(255,200,150,.5);}
.rr{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.rda{font-size:10px;color:rgba(255,200,150,.5);}
.dl{background:none;border:none;color:rgba(255,200,150,.3);cursor:pointer;font-size:14px;padding:4px;}
.dl:active{color:#f09080;}
.emp{color:rgba(255,200,150,.4);font-size:12px;text-align:center;padding:20px 0;}
.uvb{background:rgba(110,60,5,.55);backdrop-filter:blur(10px);
  border:1px solid rgba(240,192,64,.4);border-radius:12px;
  padding:10px 13px;margin-bottom:10px;font-size:12px;color:#f5d060;}
.cc{background:rgba(0,0,0,.28);backdrop-filter:blur(16px);
  border:1px solid rgba(255,200,150,.16);border-radius:12px;padding:12px 13px;margin-bottom:10px;}
.ib{background:rgba(0,0,0,.18);border-radius:8px;padding:9px 11px;margin-bottom:9px;
  font-size:12px;color:rgba(255,210,170,.75);line-height:1.7;}
input[type=date]{cursor:pointer;color-scheme:dark;}
</style>
</head>
<body>
<div id="bg"></div>
<div class="mist"><div class="ml"></div><div class="ml"></div><div class="ml"></div><div class="ml"></div></div>
<div id="ov"></div>
<div id="app">
  <div id="install-banner">
    <p>📲 Instala o Yoshi no teu telemóvel!</p>
    <button onclick="installApp()">Instalar</button>
    <button id="dismiss-btn" onclick="this.parentElement.style.display='none'">✕</button>
  </div>

const mBlob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
const mURL  = URL.createObjectURL(mBlob);
const mLink = document.createElement('link');
mLink.rel = 'manifest'; mLink.href = mURL;
document.head.appendChild(mLink);

// ── Install prompt ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  toast('✅ App instalada com sucesso!');
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; });
  } else {
    toast('📲 No iPhone: partilhar → "Adicionar ao ecrã inicial"');
  }
}

// ── App logic ──
const KEY="cham_v4";
const blank={name:"Yoshi",uvDate:"",weightLog:[],feedLog:[],moltLog:[],bathLog:[],vitaminLog:[]};
let data=JSON.parse(localStorage.getItem(KEY)||"null")||{...blank};
const save=()=>localStorage.setItem(KEY,JSON.stringify(data));
const fd=iso=>iso?new Date(iso).toLocaleDateString("pt-PT",{day:"2-digit",month:"short",year:"numeric"}):"—";
const ds=iso=>iso?Math.floor((Date.now()-new Date(iso))/86400000):null;
const ms=iso=>iso?((Date.now()-new Date(iso))/(86400000*30.44)).toFixed(1):null;
const today=()=>new Date().toISOString().slice(0,10);

const TABS=[
  {id:"dash",icon:"◈",label:"Resumo"},{id:"weight",icon:"⚖",label:"Peso"},
  {id:"feed",icon:"🦗",label:"Larvas"},{id:"molt",icon:"✦",label:"Muda"},
  {id:"bath",icon:"◉",label:"Banho"},{id:"vitamins",icon:"✿",label:"Vitaminas"},
  {id:"uv",icon:"☀",label:"UV"},
];
let tab="dash";

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",2500);}
function bdg(days,warn,alert){
  if(days===null)return'<span class="bn">Nunca</span>';
  if(days===0)return'<span class="bok">Hoje</span>';
  if(alert||days>warn)return`<span class="bw">${days}d atrás</span>`;
  return`<span class="bok">${days}d atrás</span>`;
}
function row(label,sub,date,field,id){
  return`<div class="row"><div class="rl"><span class="rla">${label}</span>${sub?`<span class="rsu">${sub}</span>`:""}</div><div class="rr"><span class="rda">${fd(date)}</span><button class="dl" onclick="del('${field}','${id}')">✕</button></div></div>`;
}
function del(field,id){data[field]=data[field].filter(e=>e.id!=id);save();render();}

function render(){
  document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="nb${tab===t.id?" act":""}" onclick="setTab('${t.id}')"><span class="ni">${t.icon}</span>${t.label}</button>`).join("");
  const lB=data.bathLog[0]?.date||null,lV=data.vitaminLog[0]?.date||null;
  const lM=data.moltLog[0]?.date||null,lF=data.feedLog[0]?.date||null;
  const lW=data.weightLog[0]?.value||null,pW=data.weightLog[1]?.value||null;
  const wd=lW&&pW?(lW-pW).toFixed(1):null;
  const uvM=data.uvDate?parseFloat(ms(data.uvDate)):null,uvA=uvM!==null&&uvM>=8;
  const rM=lM&&ds(lM)<=45,bW=rM?15:30,bD=ds(lB),bA=bD!==null&&bD>bW;
  const vD=ds(lV),vA=vD!==null&&vD>7;
  let html="";
  if(uvA)html+=`<div class="uvb">☀ Lâmpada UV com ${uvM} meses — substituição recomendada!</div>`;
  if(tab==="dash"){
    html+=`<div class="grid">
      <div class="card"><div class="cl">Último Peso</div><div class="cv">${lW?lW+"g":"—"}</div>${wd!==null?`<div class="${parseFloat(wd)>=0?"du":"dd"}">${parseFloat(wd)>=0?"▲":"▼"} ${Math.abs(wd)}g</div>`:""}</div>
      <div class="card"><div class="cl">Larvas</div><div class="cv2">${fd(lF)}</div>${bdg(ds(lF),2)}${data.feedLog[0]?`<div style="font-size:10px;color:rgba(255,200,150,.5);margin-top:3px">${data.feedLog[0].qty} larvas</div>`:""}</div>
      <div class="card${bA?" al":""}"><div class="cl">Banho</div><div class="cv2">${fd(lB)}</div>${bdg(bD,bW,bA)}<div style="font-size:10px;color:rgba(255,200,150,.45);margin-top:3px">${rM?"2× mês (muda)":"1× mês"}</div></div>
      <div class="card${vA?" al":""}"><div class="cl">Vitaminas</div><div class="cv2">${fd(lV)}</div>${bdg(vD,7,vA)}<div style="font-size:10px;color:rgba(255,200,150,.45);margin-top:3px">1× semana</div></div>
      <div class="card"><div class="cl">Última Muda</div><div class="cv2">${fd(lM)}</div>${bdg(ds(lM),60)}</div>
      <div class="card${uvA?" al":""}"><div class="cl">UV</div><div class="cv2">${data.uvDate?fd(data.uvDate):"—"}</div>${uvM!==null?`<div style="font-size:10px;color:${uvA?"#f5d060":"rgba(255,200,150,.45)"};margin-top:3px">${uvM}m · ${uvA?"⚠":"OK"}</div>`:""}</div>
      <div class="card full"><div class="cl">Acções Rápidas</div><div class="quick">
        <button class="qb" onclick="setTab('weight')">⚖ Peso</button>
        <button class="qb" onclick="setTab('feed')">🦗 Larvas</button>
        <button class="qb" onclick="addBath()">◉ Banho</button>
        <button class="qb" onclick="addVit()">✿ Vitaminas</button>
        <button class="qb" onclick="addMolt()">✦ Muda</button>
      </div></div>
    </div>`;
  } else if(tab==="weight"){
    html+=`<div class="sc"><div class="st">Registar Peso</div><div class="fi"><div class="lb">Peso em gramas</div><div class="ir"><input class="inp" type="number" id="wv" min="0" step="0.1" placeholder="ex: 48.5" inputmode="decimal"/><button class="ab" onclick="addWeight()">Adicionar</button></div></div></div>
    <div class="ll">${data.weightLog.length===0?'<p class="emp">Sem registos.</p>':data.weightLog.map((e,i)=>row(`${e.value} g`,i===0?"mais recente":(i===1&&wd?`Δ ${wd}g`:null),e.date,"weightLog",e.id)).join("")}</div>`;
  } else if(tab==="feed"){
    html+=`<div class="sc"><div class="st">Registar Larvas</div><div class="fi"><div class="lb">Data da refeição</div><input class="inp" type="date" id="fd2" value="${today()}"/></div><div class="fi"><div class="lb">Número de larvas</div><div class="ir"><input class="inp" type="number" id="fq" min="1" step="1" placeholder="ex: 8" inputmode="numeric"/><button class="ab" onclick="addFeed()">Registar</button></div></div></div>
    <div class="ll">${data.feedLog.length===0?'<p class="emp">Sem refeições.</p>':data.feedLog.map((e,i)=>row(`${e.qty} larva${e.qty!==1?"s":""}`,i===0?"mais recente":null,e.date,"feedLog",e.id)).join("")}</div>`;
  } else if(tab==="molt"){
    html+=`<div class="sc"><div class="st">Registar Muda</div>${lM?`<p style="font-size:12px;color:rgba(255,210,170,.75);margin-bottom:10px">Última: ${fd(lM)}</p>`:""}<button class="ab full" onclick="addMolt()">✦ Registar muda agora</button></div>
    <div class="ll">${data.moltLog.length===0?'<p class="emp">Sem mudas.</p>':data.moltLog.map((e,i)=>row(`Muda #${data.moltLog.length-i}`,i===0?"mais recente":null,e.date,"moltLog",e.id)).join("")}</div>`;
  } else if(tab==="bath"){
    html+=`<div class="sc"><div class="st">Registar Banho</div><div class="ib">${rM?'<span style="color:#f5d060">✦ Muda activa</span> — <strong>2× por mês</strong>':'Sem muda — <strong>1× por mês</strong>'}</div>${lB?`<p style="font-size:12px;color:rgba(255,210,170,.75);margin-bottom:10px">Último: ${fd(lB)} · ${bdg(bD,bW,bA)}</p>`:""}<button class="ab full" onclick="addBath()">◉ Registar banho agora</button></div>
    <div class="ll">${data.bathLog.length===0?'<p class="emp">Sem banhos.</p>':data.bathLog.map((e,i)=>row(`Banho #${data.bathLog.length-i}`,i===0?"mais recente":null,e.date,"bathLog",e.id)).join("")}</div>`;
  } else if(tab==="vitamins"){
    html+=`<div class="sc"><div class="st">Registar Vitaminas</div><div class="ib">Frequência: <strong>1× por semana</strong></div>${lV?`<p style="font-size:12px;color:rgba(255,210,170,.75);margin-bottom:10px">Última: ${fd(lV)} · ${bdg(vD,7,vA)}</p>`:""}<button class="ab full" onclick="addVit()">✿ Registar vitaminas agora</button></div>
    <div class="ll">${data.vitaminLog.length===0?'<p class="emp">Sem vitaminas.</p>':data.vitaminLog.map((e,i)=>row(`Vitaminas #${data.vitaminLog.length-i}`,i===0?"mais recente":null,e.date,"vitaminLog",e.id)).join("")}</div>`;
  } else if(tab==="uv"){
    const uvM2=data.uvDate?parseFloat(ms(data.uvDate)):null;
    html+=`${uvA?`<div class="uvb">⚠ Lâmpada com ${uvM2} meses — substituir entre 8 e 10 meses!</div>`:""}
    <div class="sc"><div class="st">Lâmpada UV-B</div><div class="fi"><div class="lb">Data de instalação</div><div class="ir"><input class="inp" type="date" id="uvd" value="${data.uvDate||""}"/><button class="ab" onclick="saveUV()">Guardar</button></div></div>${data.uvDate?`<div style="font-size:12px;color:rgba(255,210,170,.75);margin-top:6px;line-height:1.7">Instalada a ${fd(data.uvDate)} · há ${uvM2} meses<br/>${uvA?'<span style="color:#f5d060">⚠ Substituir!</span>':'<span style="color:#a0f080">✓ OK</span>'}</div>`:""}</div>
    <div class="sc" style="font-size:12px;color:rgba(255,200,150,.5);line-height:1.8"><div class="cl" style="margin-bottom:6px">ℹ Lembrete</div>Substituir entre os <strong style="color:#fff">8 e 10 meses</strong>.</div>`;
  }
  document.getElementById("main").innerHTML=html;
}

function setTab(t){tab=t;render();}
function addWeight(){const v=parseFloat(document.getElementById("wv")?.value);if(!v||v<=0)return;data.weightLog=[{id:Date.now(),date:new Date().toISOString(),value:v},...data.weightLog];save();render();toast("⚖ Peso registado!");}
function addFeed(){const q=parseInt(document.getElementById("fq")?.value);const d2=document.getElementById("fd2")?.value||today();if(!q||q<=0)return;data.feedLog=[{id:Date.now(),date:new Date(d2+"T12:00:00").toISOString(),qty:q},...data.feedLog];save();render();toast("🦗 Larvas registadas!");}
function addMolt(){data.moltLog=[{id:Date.now(),date:new Date().toISOString()},...data.moltLog];save();render();toast("✦ Muda registada!");}
function addBath(){data.bathLog=[{id:Date.now(),date:new Date().toISOString()},...data.bathLog];save();render();toast("◉ Banho registado!");}
function addVit(){data.vitaminLog=[{id:Date.now(),date:new Date().toISOString()},...data.vitaminLog];save();render();toast("✿ Vitaminas registadas!");}
function saveUV(){const v=document.getElementById("uvd")?.value;if(v){data.uvDate=v;save();render();toast("☀ UV guardado!");}}
render();
</script>
</body>
</html>
